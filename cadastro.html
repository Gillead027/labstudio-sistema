<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro Online - LabStudio CRJ FLEXAL</title>

  <style>
    /* ===============================
       CORES E FUNDO DO CADASTRO ONLINE
       Mantém o mesmo tema escuro moderno do sistema.
    =============================== */
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg: #0f172a;
      --page-bg:
        radial-gradient(circle at top left, rgba(99, 102, 241, 0.24), transparent 34rem),
        linear-gradient(145deg, #020617 0%, var(--bg) 48%, #111827 100%);
      --card-bg: linear-gradient(180deg, rgba(30, 41, 59, 0.96), rgba(15, 23, 42, 0.96));
      --text: #f8fafc;
      --muted: #94a3b8;
      --label: #94a3b8;
      --input-bg: #334155;
      --input-text: #ffffff;
      --input-focus-bg: #273449;
      --border: #475569;
      --danger: #ef4444;
      --success: #22c55e;
      --warning: #f59e0b;
      --error-text: #fecaca;
      --success-text: #bbf7d0;
      --warning-text: #fde68a;
      --shadow-card: 0 24px 70px rgba(0,0,0,0.48), inset 0 1px 0 rgba(255,255,255,0.06);
      --shadow-button: 0 14px 28px rgba(79, 70, 229, 0.28);
      --shadow-button-hover: 0 18px 34px rgba(79, 70, 229, 0.35);
      --toast-bg: rgba(15, 23, 42, 0.96);
      --aviso-bg: rgba(15, 23, 42, 0.82);
      --aviso-erro-bg: rgba(127, 29, 29, 0.45);
      --aviso-sucesso-bg: rgba(20, 83, 45, 0.45);
      --aviso-alerta-bg: rgba(113, 63, 18, 0.45);
    }

    /* ===============================
       TEMA CLARO
       Usa as mesmas variáveis para preservar o layout e melhorar contraste.
    =============================== */
    html[data-theme="light"] {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --bg: #eef2ff;
      --page-bg:
        radial-gradient(circle at top left, rgba(79, 70, 229, 0.16), transparent 30rem),
        linear-gradient(145deg, #f8fafc 0%, #eef2ff 52%, #e0f2fe 100%);
      --card-bg: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(241,245,249,0.96));
      --text: #0f172a;
      --muted: #475569;
      --label: #334155;
      --input-bg: #ffffff;
      --input-text: #0f172a;
      --input-focus-bg: #f8fafc;
      --border: #cbd5e1;
      --error-text: #b91c1c;
      --success-text: #166534;
      --warning-text: #92400e;
      --shadow-card: 0 22px 58px rgba(15, 23, 42, 0.16), inset 0 1px 0 rgba(255,255,255,0.7);
      --shadow-button: 0 14px 28px rgba(79, 70, 229, 0.2);
      --shadow-button-hover: 0 18px 34px rgba(79, 70, 229, 0.26);
      --toast-bg: rgba(255,255,255,0.97);
      --aviso-bg: rgba(255,255,255,0.9);
      --aviso-erro-bg: rgba(254, 226, 226, 0.95);
      --aviso-sucesso-bg: rgba(220, 252, 231, 0.95);
      --aviso-alerta-bg: rgba(254, 243, 199, 0.95);
    }

    html {
      min-height: 100%;
      background: var(--page-bg);
      background-repeat: no-repeat;
      background-size: cover;
      background-attachment: fixed;
    }

    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: transparent;
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    /* ===============================
       CARD PRINCIPAL DO CADASTRO
    =============================== */
    .container {
      background: var(--card-bg);
      padding: 2.1rem;
      border-radius: 1.1rem;
      box-shadow: var(--shadow-card);
      width: 100%;
      max-width: 440px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      animation: entrarSuave 0.45s ease both;
    }

    h1 {
      margin: 0 0 0.8rem;
      color: var(--primary);
      font-size: 1.75rem;
      text-align: center;
    }

    .descricao {
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
      margin: 0 0 1.6rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      margin-bottom: 0.55rem;
      color: var(--label);
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 0.85rem;
      border-radius: 0.7rem;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--input-text);
      font-size: 1rem;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    input:focus {
      border-color: var(--primary);
      background: var(--input-focus-bg);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    button {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 0.7rem;
      background: var(--primary);
      color: white;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 0.6rem;
      box-shadow: var(--shadow-button);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    button:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: var(--shadow-button-hover);
    }

    button:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.24), var(--shadow-button-hover);
    }

    button:disabled {
      background: var(--border);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* ===============================
       ALERTAS VISUAIS
       Mostram o retorno da validação e do envio.
    =============================== */
    .aviso {
      display: none;
      margin-bottom: 1rem;
      padding: 0.9rem;
      border-radius: 0.8rem;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: var(--aviso-bg);
      color: var(--text);
      line-height: 1.4;
      white-space: pre-line;
    }

    .aviso.erro {
      border-color: rgba(239, 68, 68, 0.5);
      background: var(--aviso-erro-bg);
    }

    .aviso.sucesso {
      border-color: rgba(34, 197, 94, 0.5);
      background: var(--aviso-sucesso-bg);
    }

    .aviso.aviso-tipo {
      border-color: rgba(245, 158, 11, 0.5);
      background: var(--aviso-alerta-bg);
    }

    /* ===============================
       VALIDAÇÃO EM TEMPO REAL
       Mostra idade e orientações sem depender de alertas.
    =============================== */
    .campo-ajuda {
      min-height: 1.1rem;
      margin-top: 0.45rem;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.35;
    }

    .campo-ajuda.erro {
      color: var(--error-text);
    }

    .campo-ajuda.sucesso {
      color: var(--success-text);
    }

    .campo-ajuda.aviso {
      color: var(--warning-text);
    }

    input.campo-invalido {
      border-color: rgba(239, 68, 68, 0.72);
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.14);
    }

    /* ===============================
       TOASTS VISUAIS
       Mensagens rápidas de sucesso, erro e aviso.
    =============================== */
    .toast-container {
      position: fixed;
      top: 70px;
      right: 18px;
      z-index: 20;
      display: grid;
      gap: 10px;
      width: min(340px, calc(100vw - 28px));
    }

    .toast {
      padding: 0.9rem 1rem;
      border-radius: 0.85rem;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: var(--toast-bg);
      color: var(--text);
      box-shadow: 0 18px 42px rgba(0,0,0,0.36);
      line-height: 1.4;
      animation: entrarSuave 0.22s ease both;
    }

    .toast.sucesso {
      border-color: rgba(34, 197, 94, 0.48);
    }

    .toast.erro {
      border-color: rgba(239, 68, 68, 0.52);
    }

    .toast.aviso-tipo {
      border-color: rgba(245, 158, 11, 0.52);
    }

    /* ===============================
       BOTÃO DE TEMA
       Permite alternar claro/escuro sem ocupar o formulário.
    =============================== */
    .theme-toggle {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 25;
      width: auto;
      margin: 0;
      padding: 0.65rem 0.85rem;
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 999px;
      background: var(--toast-bg);
      color: var(--text);
      box-shadow: 0 12px 32px rgba(0,0,0,0.18);
      font-size: 0.9rem;
    }

    .theme-toggle:hover,
    .theme-toggle:focus-visible {
      border-color: rgba(99, 102, 241, 0.5);
      outline: none;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.18), 0 12px 32px rgba(0,0,0,0.18);
    }

    @keyframes entrarSuave {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      body {
        align-items: flex-start;
        padding: 14px;
      }

      .container {
        padding: 1.35rem;
        margin-top: 18px;
      }

      h1 {
        font-size: 1.45rem;
      }

      .toast-container {
        top: 58px;
        right: 10px;
        left: 10px;
        width: auto;
      }

      .theme-toggle {
        top: 10px;
        right: 10px;
        padding: 0.55rem 0.75rem;
      }
    }
  </style>
</head>

<body>
  <button id="btnTema" class="theme-toggle" type="button" aria-label="Alternar tema">🌙 Escuro</button>
  <div id="toastContainer" class="toast-container" aria-live="polite"></div>

  <!-- ===============================
       FORMULÁRIO DE CADASTRO ONLINE
  =============================== -->
  <div class="container">
    <h1>Cadastro Online - LabStudio CRJ FLEXAL</h1>
    <p class="descricao">
      Envie seus dados para análise da equipe do CRJ. Após aprovação, você poderá solicitar o agendamento pelo WhatsApp.
    </p>

    <div id="aviso" class="aviso"></div>

    <div class="form-group">
      <label for="nome">Nome completo</label>
      <input type="text" id="nome" placeholder="Digite seu nome completo">
      <div id="ajudaNome" class="campo-ajuda"></div>
    </div>

    <div class="form-group">
      <label for="telefone">WhatsApp</label>
      <input type="text" id="telefone" placeholder="Ex: 27999999999">
      <div id="ajudaTelefone" class="campo-ajuda"></div>
    </div>

    <div class="form-group">
      <label for="dataNascimento">Data de nascimento</label>
      <input type="date" id="dataNascimento">
      <div id="ajudaDataNascimento" class="campo-ajuda"></div>
    </div>

    <button id="btnEnviar">Enviar cadastro</button>
  </div>

  <script>
    const inputNome = document.getElementById("nome");
    const inputTelefone = document.getElementById("telefone");
    const inputDataNascimento = document.getElementById("dataNascimento");
    const btnEnviar = document.getElementById("btnEnviar");
    const aviso = document.getElementById("aviso");
    const btnTema = document.getElementById("btnTema");
    const toastContainer = document.getElementById("toastContainer");
    const ajudaNome = document.getElementById("ajudaNome");
    const ajudaTelefone = document.getElementById("ajudaTelefone");
    const ajudaDataNascimento = document.getElementById("ajudaDataNascimento");

    // ===============================
    // URL BASE DA API
    // Deixe em branco para usar rotas relativas.
    // No Vercel, o arquivo vercel.json encaminha essas rotas para a VPS.
    // ===============================
    const API_BASE_URL = "";

    // ===============================
    // FUNÇÕES DE TEMA
    // Aplicam o tema salvo e preservam a escolha no localStorage.
    // ===============================
    function aplicarTema(tema) {
      const temaFinal = tema === "light" ? "light" : "dark";

      document.documentElement.dataset.theme = temaFinal;
      btnTema.innerText = temaFinal === "light" ? "☀️ Claro" : "🌙 Escuro";
      btnTema.setAttribute(
        "aria-label",
        temaFinal === "light" ? "Tema claro ativo. Alternar para escuro." : "Tema escuro ativo. Alternar para claro."
      );
    }

    function carregarTemaSalvo() {
      const temaSalvo = localStorage.getItem("labstudio_tema") || "dark";
      aplicarTema(temaSalvo);
    }

    function alternarTema() {
      const temaAtual = document.documentElement.dataset.theme === "light" ? "light" : "dark";
      const proximoTema = temaAtual === "light" ? "dark" : "light";

      localStorage.setItem("labstudio_tema", proximoTema);
      aplicarTema(proximoTema);
    }

    // ===============================
    // FUNÇÃO: MOSTRAR AVISO VISUAL
    // ===============================
    function mostrarAviso(mensagem, tipo = "erro") {
      aviso.innerText = mensagem;
      aviso.className = `aviso ${tipo === "aviso" ? "aviso-tipo" : tipo}`;
      aviso.style.display = "block";
    }

    // ===============================
    // FUNÇÃO: MOSTRAR TOAST
    // Exibe notificações rápidas sem bloquear a interação.
    // ===============================
    function mostrarToast(mensagem, tipo = "erro") {
      const toast = document.createElement("div");
      toast.className = `toast ${tipo === "aviso" ? "aviso-tipo" : tipo}`;
      toast.textContent = mensagem;
      toastContainer.appendChild(toast);

      setTimeout(() => {
        toast.remove();
      }, 4200);
    }

    async function fetchApiJson(url, options = {}) {
      const requestUrl = url.startsWith("http") ? url : `${API_BASE_URL.replace(/\/$/, "")}${url}`;
      const resposta = await fetch(requestUrl, options);
      const texto = await resposta.text();
      const contentType = (resposta.headers.get("content-type") || "").toLowerCase();

      if (!contentType.includes("application/json")) {
        throw new Error(
          "Resposta inesperada do servidor. Verifique se o backend esta ativo e se a URL da API esta correta."
        );
      }

      let resultado;

      try {
        resultado = JSON.parse(texto);
      } catch (err) {
        throw new Error(`Resposta JSON invalida do servidor: ${texto.slice(0, 160)}`);
      }

      if (!resposta.ok) {
        throw new Error(resultado.mensagem || `Erro ${resposta.status}: ${resposta.statusText}`);
      }

      return resultado;
    }

    // ===============================
    // FUNÇÃO: ESTADO DE LOADING DO BOTÃO
    // Desabilita o botão enquanto o cadastro é enviado.
    // ===============================
    function definirLoadingBotao(botao, carregando, textoCarregando, textoNormal) {
      botao.disabled = carregando;
      botao.innerText = carregando ? textoCarregando : textoNormal;
    }

    // ===============================
    // FUNÇÃO: LIMPAR TELEFONE
    // Remove pontos, espaços, parênteses, traços e símbolos.
    // ===============================
    function limparTelefone(valor) {
      return String(valor || "").replace(/\D/g, "");
    }

    // ===============================
    // FUNÇÃO: GERAR VARIAÇÕES DO TELEFONE
    // Compara números com/sem 55 e com/sem nono dígito.
    // ===============================
    function gerarVariantesTelefone(valor) {
      const numero = limparTelefone(valor);

      if (!numero) return [];

      const variantes = new Set();

      function adicionar(n) {
        if (!n) return;

        variantes.add(n);

        if (n.startsWith("55")) {
          variantes.add(n.slice(2));
        } else {
          variantes.add("55" + n);
        }
      }

      adicionar(numero);

      const sem55 = numero.startsWith("55") ? numero.slice(2) : numero;
      adicionar(sem55);

      if (sem55.length === 11 && sem55[2] === "9") {
        adicionar(sem55.slice(0, 2) + sem55.slice(3));
      }

      if (sem55.length === 10) {
        adicionar(sem55.slice(0, 2) + "9" + sem55.slice(2));
      }

      return [...variantes];
    }

    // ===============================
    // FUNÇÃO: CALCULAR IDADE
    // ===============================
    function calcularIdade(dataNascimento) {
      if (!dataNascimento) return null;

      const partes = String(dataNascimento).split("T")[0].split("-");
      if (partes.length !== 3) return null;

      const [ano, mes, dia] = partes.map(Number);
      const nascimento = new Date(ano, mes - 1, dia);

      if (
        Number.isNaN(nascimento.getTime()) ||
        nascimento.getFullYear() !== ano ||
        nascimento.getMonth() !== mes - 1 ||
        nascimento.getDate() !== dia
      ) {
        return null;
      }

      const hoje = new Date();
      let idade = hoje.getFullYear() - nascimento.getFullYear();
      const aniversarioJaPassou =
        hoje.getMonth() > nascimento.getMonth() ||
        (hoje.getMonth() === nascimento.getMonth() && hoje.getDate() >= nascimento.getDate());

      if (!aniversarioJaPassou) {
        idade--;
      }

      return idade;
    }

    // ===============================
    // FUNÇÃO: VALIDAR FAIXA ETÁRIA DO CRJ
    // ===============================
    function idadePermitida(dataNascimento) {
      const idade = calcularIdade(dataNascimento);
      return idade !== null && idade >= 15 && idade <= 29;
    }

    // ===============================
    // FUNÇÕES: VALIDAÇÃO EM TEMPO REAL
    // Guiam o jovem e mostram a idade calculada antes do envio.
    // ===============================
    function atualizarAjuda(campo, elementoAjuda, mensagem, tipo = "") {
      elementoAjuda.textContent = mensagem;
      elementoAjuda.className = `campo-ajuda ${tipo}`;
      campo.classList.toggle("campo-invalido", tipo === "erro");
    }

    function validarNomeTempoReal() {
      const nome = inputNome.value.trim();

      if (!nome) {
        atualizarAjuda(inputNome, ajudaNome, "Informe seu nome completo.", "erro");
        return false;
      }

      if (nome.split(/\s+/).length < 2) {
        atualizarAjuda(inputNome, ajudaNome, "Digite nome e sobrenome.", "erro");
        return false;
      }

      atualizarAjuda(inputNome, ajudaNome, "Nome completo preenchido.", "sucesso");
      return true;
    }

    function validarTelefoneTempoReal() {
      const telefone = limparTelefone(inputTelefone.value);

      if (!telefone) {
        atualizarAjuda(inputTelefone, ajudaTelefone, "Informe um WhatsApp com DDD.", "erro");
        return false;
      }

      if (telefone.length < 10) {
        atualizarAjuda(inputTelefone, ajudaTelefone, "Telefone incompleto. Use DDD + número.", "erro");
        return false;
      }

      atualizarAjuda(inputTelefone, ajudaTelefone, "WhatsApp preenchido.", "sucesso");
      return true;
    }

    function validarDataNascimentoTempoReal() {
      const dataNascimento = inputDataNascimento.value;
      const idade = calcularIdade(dataNascimento);

      if (!dataNascimento || idade === null) {
        atualizarAjuda(inputDataNascimento, ajudaDataNascimento, "Informe uma data de nascimento válida.", "erro");
        return false;
      }

      if (!idadePermitida(dataNascimento)) {
        atualizarAjuda(inputDataNascimento, ajudaDataNascimento, `Idade calculada: ${idade} anos. O CRJ atende jovens de 15 a 29 anos.`, "erro");
        mostrarAviso("O CRJ atende jovens de 15 a 29 anos.", "aviso");
        return false;
      }

      atualizarAjuda(inputDataNascimento, ajudaDataNascimento, `Idade calculada: ${idade} anos.`, "sucesso");
      return true;
    }

    function formularioCadastroValido() {
      const nomeValido = validarNomeTempoReal();
      const telefoneValido = validarTelefoneTempoReal();
      const dataValida = validarDataNascimentoTempoReal();

      return nomeValido && telefoneValido && dataValida;
    }

    // ===============================
    // EVENTO: ENVIAR CADASTRO ONLINE
    // Valida dados e envia para a API segura do servidor.
    // ===============================
    btnEnviar.addEventListener("click", async () => {
      const nome = inputNome.value.trim();
      const telefoneLimpo = limparTelefone(inputTelefone.value);
      const dataNascimento = inputDataNascimento.value;

      if (!formularioCadastroValido() || !nome || !telefoneLimpo || !dataNascimento) {
        mostrarAviso("Preencha nome completo, WhatsApp e data de nascimento.");
        mostrarToast("Preencha os campos destacados para enviar o cadastro.", "aviso");
        return;
      }

      if (!idadePermitida(dataNascimento)) {
        mostrarAviso("O CRJ atende jovens de 15 a 29 anos.", "aviso");
        mostrarToast("O CRJ atende jovens de 15 a 29 anos.", "aviso");
        return;
      }

      definirLoadingBotao(btnEnviar, true, "Enviando...", "Enviar cadastro");

      try {
        // ===============================
        // ENVIAR CADASTRO PARA O SERVIDOR
        // O servidor verifica duplicidade e salva no Supabase com service role.
        // ===============================
        const resultado = await fetchApiJson("/api/cadastro-online", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            nome: nome,
            telefone: telefoneLimpo,
            data_nascimento: dataNascimento
          })
        });

        if (!resultado.ok) {
          mostrarAviso(resultado.mensagem || "Erro ao enviar cadastro.");
          mostrarToast(resultado.mensagem || "Erro ao enviar cadastro.", "erro");
          return;
        }

        const mensagemSucesso = resultado.mensagem || "Cadastro enviado com sucesso! A equipe do CRJ irá analisar seus dados. Após aprovação, você poderá solicitar o agendamento pelo WhatsApp.";

        mostrarAviso(mensagemSucesso, "sucesso");
        mostrarToast(mensagemSucesso, "sucesso");

        inputNome.value = "";
        inputTelefone.value = "";
        inputDataNascimento.value = "";
        ajudaNome.textContent = "";
        ajudaTelefone.textContent = "";
        ajudaDataNascimento.textContent = "";
        inputNome.classList.remove("campo-invalido");
        inputTelefone.classList.remove("campo-invalido");
        inputDataNascimento.classList.remove("campo-invalido");

      } catch (err) {
        mostrarAviso("Erro ao enviar cadastro: " + err.message);
        mostrarToast("Erro ao enviar cadastro: " + err.message, "erro");
      } finally {
        definirLoadingBotao(btnEnviar, false, "Enviando...", "Enviar cadastro");
      }
    });

    carregarTemaSalvo();
    btnTema.addEventListener("click", alternarTema);
    inputNome.addEventListener("input", validarNomeTempoReal);
    inputTelefone.addEventListener("input", validarTelefoneTempoReal);
    inputDataNascimento.addEventListener("change", validarDataNascimentoTempoReal);
  </script>
