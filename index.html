<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LabStudio CRJ Flexal - Agendamento</title>
  <style>
    :root { --primary: #6366f1; --primary-hover: #4f46e5; --bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; --input-bg: #334155; --border: #475569; }
    body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
    .container { background-color: var(--card-bg); padding: 2rem; border-radius: 1rem; width: 100%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1); }
    h1 { text-align: center; color: var(--primary); }
    .form-group { margin-bottom: 1.2rem; }
    label { display: block; margin-bottom: 0.5rem; color: #94a3b8; font-size: 0.8rem; text-transform: uppercase; }
    input, select { width: 100%; padding: 0.8rem; border-radius: 0.5rem; border: 1px solid var(--border); background: var(--input-bg); color: white; box-sizing: border-box; }
    button { width: 100%; padding: 1rem; border-radius: 0.5rem; background: var(--primary); color: white; font-weight: bold; cursor: pointer; border: none; margin-top: 1rem; }
    button:disabled { background: #475569; }
  </style>
</head>
<body>
  <div class="container">
    <h1>LabStudio CRJ</h1>
    <div class="form-group">
      <label>Nome do Artista</label>
      <input type="text" id="nome" placeholder="Ex: MC Jovem">
    </div>
    <div class="form-group">
      <label>Data do Set</label>
      <input type="date" id="data">
    </div>
    <div class="form-group">
      <label>Horários Disponíveis</label>
      <select id="horario"><option value="">Selecione a data</option></select>
    </div>
    <button id="btn">Confirmar Agendamento</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const client = window.supabase.createClient(
      "https://hblxvxgocemzctjbutgi.supabase.co",
      "sb_publishable_12C1Wu47s3SuxqHZvQybdg_WubBGiQl"
    );

    const horariosTerQui = ["18:00", "18:30"];
    const horariosSexta = ["14:00", "15:00", "16:00"];
    
    const inputNome = document.getElementById("nome");
    const inputData = document.getElementById("data");
    const selectHorario = document.getElementById("horario");
    const btnAgendar = document.getElementById("btn");

    inputData.addEventListener("change", async () => {
      const dataSel = inputData.value;
      if (!dataSel) return;

      const diaSemana = new Date(dataSel + "T12:00:00").getDay();
      if ([0, 1, 3, 6].includes(diaSemana)) {
        alert("Funcionamos apenas Terças, Quintas e Sextas.");
        inputData.value = "";
        return;
      }

      selectHorario.innerHTML = "<option>Consultando...</option>";
      
      try {
        const { data: agendados } = await client.from("agendamentos").select("horario").eq("data", dataSel);
        const ocupados = (agendados || []).map(h => h.horario.trim());
        let grade = (diaSemana === 5) ? horariosSexta : horariosTerQui;

        selectHorario.innerHTML = '<option value="">Escolha o horário</option>';
        grade.forEach(h => {
          if (!ocupados.includes(h)) {
            const opt = document.createElement("option");
            opt.value = h; opt.textContent = h;
            selectHorario.appendChild(opt);
          }
        });
      } catch (e) {
        selectHorario.innerHTML = '<option value="">Erro ao carregar</option>';
      }
    });

    btnAgendar.addEventListener("click", async () => {
      const nome = inputNome.value;
      const data = inputData.value;
      const horario = selectHorario.value;

      if (!nome || !data || !horario) return alert("Preencha tudo!");

      btnAgendar.disabled = true;
      btnAgendar.innerText = "Salvando...";

      // 1. SALVA NO BANCO (Prioridade total)
      const { error } = await client.from("agendamentos").insert([{ nome, data, horario }]);

      if (error) {
        alert("Erro no banco: " + error.message);
        btnAgendar.disabled = false;
        return;
      }

      alert("Agendado com sucesso!");

      // 2. TENTA AVISAR O BOT (Se falhar, não tem problema)
      fetch("https://labstudio-sistema-v2.onrender.com/notificar", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nome, data, horario })
      }).catch(e => console.log("Bot não avisado, mas salvo no banco."));

      location.reload();
    });
  </script>
</body>
</html>
