<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LabStudio CRJ FLEXAL - Agendamento</title>
  
  <style>
    /* ===============================
       CORES E VARIÁVEIS DO SISTEMA
    =============================== */
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --primary-soft: rgba(99, 102, 241, 0.18);
      --bg: #0f172a;
      --page-bg:
        radial-gradient(circle at top left, rgba(99, 102, 241, 0.25), transparent 32rem),
        linear-gradient(145deg, #020617 0%, var(--bg) 50%, #111827 100%);
      --card-bg: linear-gradient(180deg, rgba(30, 41, 59, 0.96), rgba(15, 23, 42, 0.96));
      --option-bg: #1e293b;
      --text: #f8fafc;
      --muted: #94a3b8;
      --label: #94a3b8;
      --input-bg: #334155;
      --input-text: #ffffff;
      --input-focus-bg: #273449;
      --border: #475569;
      --danger: #ef4444;
      --success: #22c55e;
      --warning: #f59e0b;
      --error-text: #fecaca;
      --success-text: #bbf7d0;
      --shadow-card: 0 24px 70px rgba(0,0,0,0.48), inset 0 1px 0 rgba(255,255,255,0.06);
      --shadow-button: 0 14px 28px rgba(79, 70, 229, 0.28);
      --shadow-button-hover: 0 18px 34px rgba(79, 70, 229, 0.35);
      --toast-bg: rgba(15, 23, 42, 0.96);
      --aviso-bg: rgba(15, 23, 42, 0.82);
      --aviso-erro-bg: rgba(127, 29, 29, 0.45);
      --aviso-sucesso-bg: rgba(20, 83, 45, 0.45);
      --aviso-alerta-bg: rgba(113, 63, 18, 0.45);
      --title-shadow: 0 0 24px rgba(99, 102, 241, 0.32);
    }

    /* ===============================
       TEMA CLARO
       Mantém o contraste usando as mesmas variáveis do tema escuro.
    =============================== */
    html[data-theme="light"] {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --primary-soft: rgba(79, 70, 229, 0.13);
      --bg: #eef2ff;
      --page-bg:
        radial-gradient(circle at top left, rgba(79, 70, 229, 0.16), transparent 30rem),
        linear-gradient(145deg, #f8fafc 0%, #eef2ff 52%, #e0f2fe 100%);
      --card-bg: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(241,245,249,0.96));
      --option-bg: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --label: #334155;
      --input-bg: #ffffff;
      --input-text: #0f172a;
      --input-focus-bg: #f8fafc;
      --border: #cbd5e1;
      --error-text: #b91c1c;
      --success-text: #166534;
      --shadow-card: 0 22px 58px rgba(15, 23, 42, 0.16), inset 0 1px 0 rgba(255,255,255,0.7);
      --shadow-button: 0 14px 28px rgba(79, 70, 229, 0.2);
      --shadow-button-hover: 0 18px 34px rgba(79, 70, 229, 0.26);
      --toast-bg: rgba(255,255,255,0.97);
      --aviso-bg: rgba(255,255,255,0.9);
      --aviso-erro-bg: rgba(254, 226, 226, 0.95);
      --aviso-sucesso-bg: rgba(220, 252, 231, 0.95);
      --aviso-alerta-bg: rgba(254, 243, 199, 0.95);
      --title-shadow: none;
    }

    /* ===============================
       ESTILO GERAL DA PÁGINA
    =============================== */
    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: var(--page-bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    /* ===============================
       CARD PRINCIPAL DO FORMULÁRIO
    =============================== */
    .container {
      background: var(--card-bg);
      padding: 2.1rem;
      border-radius: 1.1rem;
      box-shadow: var(--shadow-card);
      width: 100%;
      max-width: 400px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      animation: entrarSuave 0.45s ease both;
    }

    h1 {
      text-align: center;
      margin-bottom: 2rem;
      color: var(--primary);
      font-size: 1.8rem;
      letter-spacing: -1px;
      text-shadow: var(--title-shadow);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.6rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--label);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, select {
      width: 100%;
      padding: 0.8rem;
      border-radius: 0.6rem;
      border: 1px solid var(--border);
      background-color: var(--input-bg);
      color: var(--input-text);
      font-size: 1rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease, background 0.2s ease;
      outline: none;
      box-sizing: border-box;
    }

    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
      background-color: var(--input-focus-bg);
    }

    button {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 0.6rem;
      background-color: var(--primary);
      color: white;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      margin-top: 1rem;
      box-shadow: var(--shadow-button);
    }

    button:hover {
      background-color: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: var(--shadow-button-hover);
    }

    button:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.24), var(--shadow-button-hover);
    }

    button:disabled {
      background-color: var(--border);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    option {
      background-color: var(--option-bg);
      color: var(--text);
    }

    /* ===============================
       ALERTAS VISUAIS DO SITE
       Mantêm as mensagens na tela sem depender apenas do alert do navegador.
    =============================== */
    .aviso {
      display: none;
      margin-bottom: 1rem;
      padding: 0.9rem;
      border-radius: 0.8rem;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: var(--aviso-bg);
      color: var(--text);
      line-height: 1.4;
      animation: entrarSuave 0.25s ease both;
    }

    .aviso.erro {
      border-color: rgba(239, 68, 68, 0.5);
      background: var(--aviso-erro-bg);
    }

    .aviso.sucesso {
      border-color: rgba(34, 197, 94, 0.5);
      background: var(--aviso-sucesso-bg);
    }

    .aviso.aviso-tipo {
      border-color: rgba(245, 158, 11, 0.5);
      background: var(--aviso-alerta-bg);
    }

    /* ===============================
       VALIDAÇÃO EM TEMPO REAL
       Mostra orientações curtas abaixo dos campos sem interromper o uso.
    =============================== */
    .campo-ajuda {
      min-height: 1.1rem;
      margin-top: 0.45rem;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.35;
    }

    .campo-ajuda.erro {
      color: var(--error-text);
    }

    .campo-ajuda.sucesso {
      color: var(--success-text);
    }

    input.campo-invalido,
    select.campo-invalido {
      border-color: rgba(239, 68, 68, 0.72);
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.14);
    }

    /* ===============================
       TOASTS VISUAIS
       Notificações rápidas para substituir alerts simples.
    =============================== */
    .toast-container {
      position: fixed;
      top: 70px;
      right: 18px;
      z-index: 20;
      display: grid;
      gap: 10px;
      width: min(340px, calc(100vw - 28px));
    }

    .toast {
      padding: 0.9rem 1rem;
      border-radius: 0.85rem;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: var(--toast-bg);
      color: var(--text);
      box-shadow: 0 18px 42px rgba(0,0,0,0.36);
      line-height: 1.4;
      animation: entrarSuave 0.22s ease both;
    }

    /* ===============================
       BOTÃO DE TEMA
       Fica fixo e discreto para não competir com o formulário.
    =============================== */
    .theme-toggle {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 25;
      width: auto;
      margin: 0;
      padding: 0.65rem 0.85rem;
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 999px;
      background: var(--toast-bg);
      color: var(--text);
      box-shadow: 0 12px 32px rgba(0,0,0,0.18);
      font-size: 0.9rem;
    }

    .theme-toggle:hover,
    .theme-toggle:focus-visible {
      border-color: rgba(99, 102, 241, 0.5);
      outline: none;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.18), 0 12px 32px rgba(0,0,0,0.18);
    }

    .toast.sucesso {
      border-color: rgba(34, 197, 94, 0.48);
    }

    .toast.erro {
      border-color: rgba(239, 68, 68, 0.52);
    }

    .toast.aviso-tipo {
      border-color: rgba(245, 158, 11, 0.52);
    }

    @keyframes entrarSuave {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===============================
       RESPONSIVIDADE
       Ajusta espaçamento e leitura em telas pequenas.
    =============================== */
    @media (max-width: 480px) {
      body {
        padding: 14px;
        align-items: flex-start;
      }

      .container {
        padding: 1.35rem;
        border-radius: 0.9rem;
        margin-top: 18px;
      }

      h1 {
        font-size: 1.55rem;
        margin-bottom: 1.4rem;
      }

      input, select, button {
        font-size: 0.98rem;
      }

      .toast-container {
        top: 58px;
        right: 10px;
        left: 10px;
        width: auto;
      }

      .theme-toggle {
        top: 10px;
        right: 10px;
        padding: 0.55rem 0.75rem;
      }
    }
  </style>
</head>

<body>
  <button id="btnTema" class="theme-toggle" type="button" aria-label="Alternar tema">🌙 Escuro</button>
  <div id="toastContainer" class="toast-container" aria-live="polite"></div>

  <!-- ===============================
       FORMULÁRIO DE AGENDAMENTO
  =============================== -->
  <div class="container">
    <h1>LabStudio CRJ FLEXAL</h1>

    <div id="aviso" class="aviso"></div>

    <div class="form-group">
      <label for="nome">Nome do Artista / Grupo</label>
      <input type="text" id="nome" placeholder="Ex: MC Jovem">
      <div id="ajudaNome" class="campo-ajuda"></div>
    </div>

    <div class="form-group">
      <label for="telefone">WhatsApp</label>
      <input type="text" id="telefone" placeholder="Ex: 27999999999">
      <div id="ajudaTelefone" class="campo-ajuda"></div>
    </div>

    <div class="form-group">
      <label for="data">Data do Set</label>
      <input type="date" id="data">
    </div>

    <div class="form-group">
      <label for="horario">Horários Disponíveis</label>
      <select id="horario">
        <option value="">Selecione uma data primeiro</option>
      </select>
    </div>

    <button id="btn">Confirmar Agendamento</button>
  </div>

  <script>
    // ===============================
    // CONFIGURAÇÃO DE FUNCIONAMENTO
    // O LabStudio funciona somente terça e quinta
    // Horários disponíveis nesses dias:
    // ===============================
    const horariosTerQui = ["18:00", "18:30"];

    // ===============================
    // DATAS BLOQUEADAS MANUALMENTE
    // Use para feriados, eventos internos ou impossibilidades
    // Formato: ANO-MÊS-DIA
    // ===============================
    const datasBloqueadas = [
      "2024-07-19",
      "2024-05-01",
      "2024-05-30"
    ];

    // ===============================
    // URL BASE DA API
    // Deixe em branco para chamadas locais.
    // Quando o frontend estiver no Vercel e o backend no Railway,
    // configure aqui o endereço completo do backend.
    // Exemplo: const API_BASE_URL = "https://labstudio-backend.up.railway.app";
    // ===============================
    const API_BASE_URL = "http://2.24.74.57:3001";

    // ===============================
    // ELEMENTOS DO HTML
    // Pegamos os campos para usar no JavaScript
    // ===============================
    const inputNome = document.getElementById("nome");
    const inputTelefone = document.getElementById("telefone");
    const inputData = document.getElementById("data");
    const selectHorario = document.getElementById("horario");
    const btnAgendar = document.getElementById("btn");
    const aviso = document.getElementById("aviso");
    const btnTema = document.getElementById("btnTema");
    const toastContainer = document.getElementById("toastContainer");
    const ajudaNome = document.getElementById("ajudaNome");
    const ajudaTelefone = document.getElementById("ajudaTelefone");

    // ===============================
    // FUNÇÕES DE TEMA
    // Carregam, aplicam e salvam a preferência de tema no navegador.
    // ===============================
    function aplicarTema(tema) {
      const temaFinal = tema === "light" ? "light" : "dark";

      document.documentElement.dataset.theme = temaFinal;
      btnTema.innerText = temaFinal === "light" ? "☀️ Claro" : "🌙 Escuro";
      btnTema.setAttribute(
        "aria-label",
        temaFinal === "light" ? "Tema claro ativo. Alternar para escuro." : "Tema escuro ativo. Alternar para claro."
      );
    }

    function carregarTemaSalvo() {
      const temaSalvo = localStorage.getItem("labstudio_tema") || "dark";
      aplicarTema(temaSalvo);
    }

    function alternarTema() {
      const temaAtual = document.documentElement.dataset.theme === "light" ? "light" : "dark";
      const proximoTema = temaAtual === "light" ? "dark" : "light";

      localStorage.setItem("labstudio_tema", proximoTema);
      aplicarTema(proximoTema);
    }

    // ===============================
    // FUNÇÃO: MOSTRAR AVISO VISUAL
    // Exibe mensagens importantes dentro do card.
    // ===============================
    function mostrarAviso(mensagem, tipo = "erro") {
      aviso.innerText = mensagem;
      aviso.className = `aviso ${tipo === "aviso" ? "aviso-tipo" : tipo}`;
      aviso.style.display = "block";
    }

    // ===============================
    // FUNÇÃO: MOSTRAR TOAST
    // Cria uma notificação visual rápida sem usar alert do navegador.
    // ===============================
    function mostrarToast(mensagem, tipo = "erro") {
      const toast = document.createElement("div");
      toast.className = `toast ${tipo === "aviso" ? "aviso-tipo" : tipo}`;
      toast.textContent = mensagem;
      toastContainer.appendChild(toast);

      setTimeout(() => {
        toast.remove();
      }, 4200);
    }

    async function fetchApiJson(url, options = {}) {
      const requestUrl = url.startsWith("http") ? url : `${API_BASE_URL.replace(/\/$/, "")}${url}`;
      console.debug("fetchApiJson requestUrl:", requestUrl);
      const resposta = await fetch(requestUrl, options);
      const texto = await resposta.text();
      const contentType = (resposta.headers.get("content-type") || "").toLowerCase();

      if (!resposta.ok) {
        let mensagemDetalhe = texto.trim().slice(0, 200);
        if (!mensagemDetalhe) {
          mensagemDetalhe = `${resposta.status} ${resposta.statusText}`;
        }

        try {
          const json = JSON.parse(texto);
          throw new Error(json.mensagem || mensagemDetalhe);
        } catch (_err) {
          throw new Error(`Erro ${resposta.status}: ${mensagemDetalhe}`);
        }
      }

      if (!contentType.includes("application/json")) {
        throw new Error(
          "Resposta inesperada do servidor. Verifique se o backend está ativo e se você abriu o site via servidor HTTP."
        );
      }

      try {
        return JSON.parse(texto);
      } catch (err) {
        throw new Error(`Resposta JSON inválida do servidor: ${texto.slice(0, 160)}`);
      }
    }

    // ===============================
    // FUNÇÃO: ESTADO DE LOADING DO BOTÃO
    // Desabilita o botão e troca o texto enquanto a ação está em andamento.
    // ===============================
    function definirLoadingBotao(botao, carregando, textoCarregando, textoNormal) {
      botao.disabled = carregando;
      botao.innerText = carregando ? textoCarregando : textoNormal;
    }

    // ===============================
    // FUNÇÃO: CALCULAR IDADE
    // Usa a data de nascimento para validar a faixa etária do CRJ.
    // ===============================
    function calcularIdade(dataNascimento) {
      if (!dataNascimento) return null;

      const partes = String(dataNascimento).split("T")[0].split("-");
      if (partes.length !== 3) return null;

      const [ano, mes, dia] = partes.map(Number);
      const nascimento = new Date(ano, mes - 1, dia);

      if (
        Number.isNaN(nascimento.getTime()) ||
        nascimento.getFullYear() !== ano ||
        nascimento.getMonth() !== mes - 1 ||
        nascimento.getDate() !== dia
      ) {
        return null;
      }

      const hoje = new Date();
      let idade = hoje.getFullYear() - nascimento.getFullYear();
      const aniversarioJaPassou =
        hoje.getMonth() > nascimento.getMonth() ||
        (hoje.getMonth() === nascimento.getMonth() && hoje.getDate() >= nascimento.getDate());

      if (!aniversarioJaPassou) {
        idade--;
      }

      return idade;
    }

    // ===============================
    // FUNÇÃO: VERIFICAR IDADE PERMITIDA
    // O CRJ atende jovens de 15 a 29 anos.
    // ===============================
    function idadePermitida(dataNascimento) {
      const idade = calcularIdade(dataNascimento);
      return idade !== null && idade >= 15 && idade <= 29;
    }

    // ===============================
    // FUNÇÃO: LIMPAR TELEFONE
    // Remove tudo que não for número.
    //
    // Exemplo:
    // "+55 27 99713-6155"
    // vira:
    // "5527997136155"
    // ===============================
    function limparTelefone(valor) {
      return String(valor || "").replace(/\D/g, "");
    }

    // ===============================
    // FUNÇÕES: VALIDAÇÃO EM TEMPO REAL
    // Orientam o jovem antes do envio final do agendamento.
    // ===============================
    function atualizarAjuda(campo, elementoAjuda, mensagem, tipo = "") {
      elementoAjuda.textContent = mensagem;
      elementoAjuda.className = `campo-ajuda ${tipo}`;
      campo.classList.toggle("campo-invalido", tipo === "erro");
    }

    function validarNomeTempoReal() {
      const nome = inputNome.value.trim();

      if (!nome) {
        atualizarAjuda(inputNome, ajudaNome, "Informe o nome do artista ou grupo.", "erro");
        return false;
      }

      if (nome.length < 2) {
        atualizarAjuda(inputNome, ajudaNome, "O nome parece curto demais.", "erro");
        return false;
      }

      atualizarAjuda(inputNome, ajudaNome, "Nome preenchido.", "sucesso");
      return true;
    }

    function validarTelefoneTempoReal() {
      const telefone = limparTelefone(inputTelefone.value);

      if (!telefone) {
        atualizarAjuda(inputTelefone, ajudaTelefone, "Informe um WhatsApp com DDD.", "erro");
        return false;
      }

      if (telefone.length < 10) {
        atualizarAjuda(inputTelefone, ajudaTelefone, "Telefone incompleto. Use DDD + número.", "erro");
        return false;
      }

      atualizarAjuda(inputTelefone, ajudaTelefone, "Telefone preenchido.", "sucesso");
      return true;
    }

    function validarFormularioTempoReal() {
      const nomeValido = validarNomeTempoReal();
      const telefoneValido = validarTelefoneTempoReal();

      return nomeValido && telefoneValido;
    }

    // ===============================
    // FUNÇÃO: GERAR VARIAÇÕES DO TELEFONE
    //
    // Isso ajuda o sistema a encontrar usuários mesmo que:
    // - no cadastro esteja com +55;
    // - no site esteja sem +55;
    // - tenha traço, espaço ou parênteses;
    // - tenha diferença com ou sem o 9º dígito.
    // ===============================
    function gerarVariantesTelefone(valor) {
      const numero = limparTelefone(valor);

      if (!numero) return [];

      const variantes = new Set();

      function adicionar(n) {
        if (!n) return;

        variantes.add(n);

        // Se tem 55, também testa sem 55
        if (n.startsWith("55")) {
          variantes.add(n.slice(2));
        } else {
          // Se não tem 55, também testa com 55
          variantes.add("55" + n);
        }
      }

      adicionar(numero);

      const sem55 = numero.startsWith("55") ? numero.slice(2) : numero;

      adicionar(sem55);

      // Caso: 27997136155
      // Também testa: 2797136155
      if (sem55.length === 11 && sem55[2] === "9") {
        const semNonoDigito = sem55.slice(0, 2) + sem55.slice(3);
        adicionar(semNonoDigito);
      }

      // Caso: 2797136155
      // Também testa: 27997136155
      if (sem55.length === 10) {
        const comNonoDigito = sem55.slice(0, 2) + "9" + sem55.slice(2);
        adicionar(comNonoDigito);
      }

      return [...variantes];
    }

    // ===============================
    // EVENTO: QUANDO O USUÁRIO ESCOLHE UMA DATA
    //
    // Aqui validamos:
    // - se é terça ou quinta;
    // - se não é uma data bloqueada;
    // - quais horários já estão ocupados;
    // - quais horários devem aparecer.
    // ===============================
    inputData.addEventListener("change", async () => {
      const dataSelecionada = inputData.value;
      if (!dataSelecionada) return;

      const dataObjeto = new Date(dataSelecionada + "T12:00:00");
      const diaSemana = dataObjeto.getDay();

      // ===============================
      // DIAS DA SEMANA:
      // 0 = domingo
      // 1 = segunda
      // 2 = terça
      // 3 = quarta
      // 4 = quinta
      // 5 = sexta
      // 6 = sábado
      // ===============================
      if (![2, 4].includes(diaSemana)) {
        mostrarAviso("O LabStudio funciona apenas às terças e quintas-feiras.");
        mostrarToast("O LabStudio funciona apenas às terças e quintas-feiras.", "aviso");
        inputData.value = "";
        selectHorario.innerHTML = '<option value="">Dia indisponível</option>';
        return;
      }

      // ===============================
      // BLOQUEIO DE DATAS ESPECÍFICAS
      // ===============================
      if (datasBloqueadas.includes(dataSelecionada)) {
        mostrarAviso("Esta data está reservada para evento interno ou feriado.");
        mostrarToast("Esta data está reservada para evento interno ou feriado.", "aviso");
        inputData.value = "";
        selectHorario.innerHTML = '<option value="">Dia indisponível</option>';
        return;
      }

      selectHorario.innerHTML = "<option>Consultando agenda...</option>";

      try {
        // ===============================
        // BUSCAR HORÁRIOS DISPONÍVEIS
        // A consulta passa pelo servidor para funcionar com RLS ativo.
        // ===============================
        const resultado = await fetchApiJson(`/api/horarios?data=${encodeURIComponent(dataSelecionada)}`);

        if (!resultado.ok) {
          throw new Error(resultado.mensagem || "Erro ao consultar agenda.");
        }

        const horariosDisponiveis = resultado.horarios || resultado.horariosDisponiveis || [];

        selectHorario.innerHTML = '<option value="">Escolha o horário</option>';

        // ===============================
        // MOSTRAR APENAS HORÁRIOS LIVRES
        // ===============================
        horariosDisponiveis.forEach(hora => {
          const option = document.createElement("option");
          option.value = hora;
          option.textContent = hora;
          selectHorario.appendChild(option);
        });

        if (selectHorario.options.length === 1) {
          selectHorario.innerHTML = '<option value="">Lotado para este dia</option>';
        }
      } catch (err) {
        mostrarAviso("Erro ao buscar horários: " + err.message);
        mostrarToast("Erro ao buscar horários: " + err.message, "erro");
        selectHorario.innerHTML = '<option value="">Erro ao consultar agenda</option>';
      }
    });

    // ===============================
    // EVENTO: BOTÃO CONFIRMAR AGENDAMENTO
    //
    // Fluxo:
    // 1. valida campos;
    // 2. envia para a API segura do servidor;
    // 3. o servidor valida cadastro, idade, faltas, status e horário;
    // 4. se salvar com sucesso, envia notificação para o bot.
    // ===============================
    btnAgendar.addEventListener("click", async () => {
      const nome = inputNome.value.trim();
      const telefone = inputTelefone.value.trim();
      const dataStr = inputData.value;
      const horario = selectHorario.value;

      // ===============================
      // VALIDAÇÃO SIMPLES DOS CAMPOS
      // ===============================
      const camposBasicosValidos = validarFormularioTempoReal();

      if (!camposBasicosValidos || !dataStr || !horario) {
        mostrarAviso("Preencha todos os campos corretamente.");
        mostrarToast("Preencha todos os campos corretamente.", "aviso");
        return;
      }

      definirLoadingBotao(btnAgendar, true, "Agendando...", "Confirmar Agendamento");

      try {
        // ===============================
        // CRIAR AGENDAMENTO VIA API
        // O servidor faz as consultas no Supabase usando service role,
        // preparando o frontend público para RLS ativo.
        // ===============================
        const resultadoAgendamento = await fetchApiJson("/api/agendar", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            nome,
            telefone,
            data: dataStr,
            horario
          })
        });

        if (!resultadoAgendamento.ok) {
          throw new Error(resultadoAgendamento.mensagem || "Erro ao salvar agendamento.");
        }

        const agendamento = resultadoAgendamento.agendamento || {};

        // ===============================
        // NOTIFICAR O BOT NO WHATSAPP
        //
        // Se o bot local estiver offline,
        // o agendamento continua salvo,
        // mas aparece aviso no console.
        // ===============================
        let notificacaoOk = true;

        try {
          await fetchApiJson("/notificar", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              nome: agendamento.nome || nome,
              telefone: agendamento.telefone || telefone,
              data: agendamento.data || dataStr,
              horario: agendamento.horario || horario
            })
          });
        } catch (zapError) {
          notificacaoOk = false;
          console.warn("Agendamento salvo, mas a notificação no WhatsApp falhou:", zapError);
          mostrarToast(
            "Agendamento salvo, mas não foi possível notificar por WhatsApp. Tente novamente em alguns minutos.",
            "aviso"
          );
        }

        const mensagemSucesso = resultadoAgendamento.mensagem || `Confirmado, ${nome}! 🔥\nTe esperamos dia ${dataStr} às ${horario}.`;

        mostrarAviso(mensagemSucesso, "sucesso");
        mostrarToast(mensagemSucesso, "sucesso");

        setTimeout(() => {
          location.reload();
        }, 1300);

      } catch (err) {
        mostrarAviso("Erro ao salvar: " + err.message);
        mostrarToast("Erro ao salvar: " + err.message, "erro");
        definirLoadingBotao(btnAgendar, false, "Agendando...", "Confirmar Agendamento");
      }
    });

    function verificarProtocoloLocal() {
      if (window.location.protocol === "file:") {
        mostrarAviso(
          "Abra a página via servidor HTTP (por exemplo, http://localhost:3001/) em vez de usar o arquivo local.",
          "aviso"
        );
        mostrarToast("Não abra index.html diretamente. Use o servidor Node.js.", "aviso");
      }
    }

    function verificarApiBaseUrl() {
      const estaNoVercel = window.location.hostname.endsWith(".vercel.app");
      const estaEmLocalhost = ["localhost", "127.0.0.1"].includes(window.location.hostname);

      if (!API_BASE_URL && (estaNoVercel || !estaEmLocalhost)) {
        mostrarAviso(
          "A URL da API não está configurada. Defina API_BASE_URL no index.html para o backend Railway.",
          "aviso"
        );
        mostrarToast(
          "API_BASE_URL ausente. O frontend Vercel precisa da URL do backend Railway.",
          "aviso"
        );
      }
    }

    carregarTemaSalvo();
    verificarProtocoloLocal();
    verificarApiBaseUrl();
    btnTema.addEventListener("click", alternarTema);
    inputNome.addEventListener("input", validarNomeTempoReal);
    inputTelefone.addEventListener("input", validarTelefoneTempoReal);
  </script>
</body>
</html>
