<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LabStudio CRJ Flexal - Agendamento</title>
  
  <style>
    /* ===============================
       CORES E VARIÁVEIS DO SISTEMA
    =============================== */
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --primary-soft: rgba(99, 102, 241, 0.18);
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text: #f8fafc;
      --muted: #94a3b8;
      --input-bg: #334155;
      --border: #475569;
      --danger: #ef4444;
      --success: #22c55e;
    }

    /* ===============================
       ESTILO GERAL DA PÁGINA
    =============================== */
    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(99, 102, 241, 0.25), transparent 32rem),
        linear-gradient(145deg, #020617 0%, var(--bg) 50%, #111827 100%);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    /* ===============================
       CARD PRINCIPAL DO FORMULÁRIO
    =============================== */
    .container {
      background:
        linear-gradient(180deg, rgba(30, 41, 59, 0.96), rgba(15, 23, 42, 0.96));
      padding: 2rem;
      border-radius: 1.1rem;
      box-shadow: 0 24px 70px rgba(0,0,0,0.48), inset 0 1px 0 rgba(255,255,255,0.06);
      width: 100%;
      max-width: 400px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      animation: entrarSuave 0.45s ease both;
    }

    h1 {
      text-align: center;
      margin-bottom: 2rem;
      color: var(--primary);
      font-size: 1.8rem;
      letter-spacing: -1px;
      text-shadow: 0 0 24px rgba(99, 102, 241, 0.32);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.6rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, select {
      width: 100%;
      padding: 0.8rem;
      border-radius: 0.6rem;
      border: 1px solid var(--border);
      background-color: var(--input-bg);
      color: white;
      font-size: 1rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease, background 0.2s ease;
      outline: none;
      box-sizing: border-box;
    }

    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
      background-color: #273449;
    }

    button {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 0.6rem;
      background-color: var(--primary);
      color: white;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      margin-top: 1rem;
      box-shadow: 0 14px 28px rgba(79, 70, 229, 0.28);
    }

    button:hover {
      background-color: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 18px 34px rgba(79, 70, 229, 0.35);
    }

    button:disabled {
      background-color: var(--border);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    option {
      background-color: var(--card-bg);
    }

    /* ===============================
       ALERTAS VISUAIS DO SITE
       Mantêm as mensagens na tela sem depender apenas do alert do navegador.
    =============================== */
    .aviso {
      display: none;
      margin-bottom: 1rem;
      padding: 0.9rem;
      border-radius: 0.8rem;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: rgba(15, 23, 42, 0.82);
      color: var(--text);
      line-height: 1.4;
      animation: entrarSuave 0.25s ease both;
    }

    .aviso.erro {
      border-color: rgba(239, 68, 68, 0.5);
      background: rgba(127, 29, 29, 0.45);
    }

    .aviso.sucesso {
      border-color: rgba(34, 197, 94, 0.5);
      background: rgba(20, 83, 45, 0.45);
    }

    @keyframes entrarSuave {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===============================
       RESPONSIVIDADE
       Ajusta espaçamento e leitura em telas pequenas.
    =============================== */
    @media (max-width: 480px) {
      body {
        padding: 14px;
        align-items: flex-start;
      }

      .container {
        padding: 1.35rem;
        border-radius: 0.9rem;
        margin-top: 18px;
      }

      h1 {
        font-size: 1.55rem;
        margin-bottom: 1.4rem;
      }

      input, select, button {
        font-size: 0.98rem;
      }
    }
  </style>
</head>

<body>

  <!-- ===============================
       FORMULÁRIO DE AGENDAMENTO
  =============================== -->
  <div class="container">
    <h1>LabStudio CRJ</h1>

    <div id="aviso" class="aviso"></div>

    <div class="form-group">
      <label for="nome">Nome do Artista / Grupo</label>
      <input type="text" id="nome" placeholder="Ex: MC Jovem">
    </div>

    <div class="form-group">
      <label for="telefone">WhatsApp</label>
      <input type="text" id="telefone" placeholder="Ex: 27999999999">
    </div>

    <div class="form-group">
      <label for="data">Data do Set</label>
      <input type="date" id="data">
    </div>

    <div class="form-group">
      <label for="horario">Horários Disponíveis</label>
      <select id="horario">
        <option value="">Selecione uma data primeiro</option>
      </select>
    </div>

    <button id="btn">Confirmar Agendamento</button>
  </div>

  <!-- ===============================
       BIBLIOTECA DO SUPABASE
  =============================== -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // ===============================
    // CONEXÃO COM SUPABASE
    // Aqui o site acessa o banco de dados
    // ===============================
    const client = window.supabase.createClient(
      "https://hblxvxgocemzctjbutgi.supabase.co",
      "sb_publishable_12C1Wu47s3SuxqHZvQybdg_WubBGiQl"
    );

    // ===============================
    // LINK DO BOT
    // IMPORTANTE:
    // Se reiniciar o ngrok e o link mudar,
    // atualize este endereço.
    // ===============================
    const BOT_URL = "https://tightly-rubber-dyslexic.ngrok-free.dev";

    // ===============================
    // CONFIGURAÇÃO DE FUNCIONAMENTO
    // O LabStudio funciona somente terça e quinta
    // Horários disponíveis nesses dias:
    // ===============================
    const horariosTerQui = ["18:00", "18:30"];

    // ===============================
    // DATAS BLOQUEADAS MANUALMENTE
    // Use para feriados, eventos internos ou impossibilidades
    // Formato: ANO-MÊS-DIA
    // ===============================
    const datasBloqueadas = [
      "2024-07-19",
      "2024-05-01",
      "2024-05-30"
    ];

    // ===============================
    // ELEMENTOS DO HTML
    // Pegamos os campos para usar no JavaScript
    // ===============================
    const inputNome = document.getElementById("nome");
    const inputTelefone = document.getElementById("telefone");
    const inputData = document.getElementById("data");
    const selectHorario = document.getElementById("horario");
    const btnAgendar = document.getElementById("btn");
    const aviso = document.getElementById("aviso");

    // ===============================
    // FUNÇÃO: MOSTRAR AVISO VISUAL
    // Exibe mensagens importantes dentro do card e mantém o alert como apoio.
    // ===============================
    function mostrarAviso(mensagem, tipo = "erro") {
      aviso.innerText = mensagem;
      aviso.className = `aviso ${tipo}`;
      aviso.style.display = "block";
    }

    // ===============================
    // FUNÇÃO: CALCULAR IDADE
    // Usa a data de nascimento para validar a faixa etária do CRJ.
    // ===============================
    function calcularIdade(dataNascimento) {
      if (!dataNascimento) return null;

      const partes = String(dataNascimento).split("T")[0].split("-");
      if (partes.length !== 3) return null;

      const [ano, mes, dia] = partes.map(Number);
      const nascimento = new Date(ano, mes - 1, dia);

      if (
        Number.isNaN(nascimento.getTime()) ||
        nascimento.getFullYear() !== ano ||
        nascimento.getMonth() !== mes - 1 ||
        nascimento.getDate() !== dia
      ) {
        return null;
      }

      const hoje = new Date();
      let idade = hoje.getFullYear() - nascimento.getFullYear();
      const aniversarioJaPassou =
        hoje.getMonth() > nascimento.getMonth() ||
        (hoje.getMonth() === nascimento.getMonth() && hoje.getDate() >= nascimento.getDate());

      if (!aniversarioJaPassou) {
        idade--;
      }

      return idade;
    }

    // ===============================
    // FUNÇÃO: VERIFICAR IDADE PERMITIDA
    // O CRJ atende jovens de 15 a 29 anos.
    // ===============================
    function idadePermitida(dataNascimento) {
      const idade = calcularIdade(dataNascimento);
      return idade !== null && idade >= 15 && idade <= 29;
    }

    // ===============================
    // FUNÇÃO: LIMPAR TELEFONE
    // Remove tudo que não for número.
    //
    // Exemplo:
    // "+55 27 99713-6155"
    // vira:
    // "5527997136155"
    // ===============================
    function limparTelefone(valor) {
      return String(valor || "").replace(/\D/g, "");
    }

    // ===============================
    // FUNÇÃO: GERAR VARIAÇÕES DO TELEFONE
    //
    // Isso ajuda o sistema a encontrar usuários mesmo que:
    // - no cadastro esteja com +55;
    // - no site esteja sem +55;
    // - tenha traço, espaço ou parênteses;
    // - tenha diferença com ou sem o 9º dígito.
    // ===============================
    function gerarVariantesTelefone(valor) {
      const numero = limparTelefone(valor);

      if (!numero) return [];

      const variantes = new Set();

      function adicionar(n) {
        if (!n) return;

        variantes.add(n);

        // Se tem 55, também testa sem 55
        if (n.startsWith("55")) {
          variantes.add(n.slice(2));
        } else {
          // Se não tem 55, também testa com 55
          variantes.add("55" + n);
        }
      }

      adicionar(numero);

      const sem55 = numero.startsWith("55") ? numero.slice(2) : numero;

      adicionar(sem55);

      // Caso: 27997136155
      // Também testa: 2797136155
      if (sem55.length === 11 && sem55[2] === "9") {
        const semNonoDigito = sem55.slice(0, 2) + sem55.slice(3);
        adicionar(semNonoDigito);
      }

      // Caso: 2797136155
      // Também testa: 27997136155
      if (sem55.length === 10) {
        const comNonoDigito = sem55.slice(0, 2) + "9" + sem55.slice(2);
        adicionar(comNonoDigito);
      }

      return [...variantes];
    }

    // ===============================
    // FUNÇÃO: BUSCAR USUÁRIO PELO TELEFONE
    //
    // Essa função consulta a tabela "usuarios"
    // e tenta encontrar o telefone informado,
    // considerando as variações possíveis.
    // ===============================
    async function buscarUsuarioPorTelefone(telefoneDigitado) {
      const variantesDigitadas = gerarVariantesTelefone(telefoneDigitado);

      console.log("🔎 Variantes digitadas:", variantesDigitadas);

      const { data: usuarios, error } = await client
        .from("usuarios")
        .select("*");

      if (error) {
        throw error;
      }

      const usuarioEncontrado = (usuarios || []).find(usuario => {
        const variantesBanco = gerarVariantesTelefone(usuario.telefone);

        return variantesBanco.some(numeroBanco =>
          variantesDigitadas.includes(numeroBanco)
        );
      });

      if (usuarioEncontrado) {
        console.log("✅ Usuário encontrado:", usuarioEncontrado.nome, usuarioEncontrado.telefone);
      } else {
        console.log("❌ Usuário não encontrado pelo telefone.");
      }

      return usuarioEncontrado || null;
    }

    // ===============================
    // EVENTO: QUANDO O USUÁRIO ESCOLHE UMA DATA
    //
    // Aqui validamos:
    // - se é terça ou quinta;
    // - se não é uma data bloqueada;
    // - quais horários já estão ocupados;
    // - quais horários devem aparecer.
    // ===============================
    inputData.addEventListener("change", async () => {
      const dataSelecionada = inputData.value;
      if (!dataSelecionada) return;

      const dataObjeto = new Date(dataSelecionada + "T12:00:00");
      const diaSemana = dataObjeto.getDay();

      // ===============================
      // DIAS DA SEMANA:
      // 0 = domingo
      // 1 = segunda
      // 2 = terça
      // 3 = quarta
      // 4 = quinta
      // 5 = sexta
      // 6 = sábado
      // ===============================
      if (![2, 4].includes(diaSemana)) {
        mostrarAviso("O LabStudio funciona apenas às terças e quintas-feiras.");
        alert("O LabStudio funciona apenas às terças e quintas-feiras.");
        inputData.value = "";
        selectHorario.innerHTML = '<option value="">Dia indisponível</option>';
        return;
      }

      // ===============================
      // BLOQUEIO DE DATAS ESPECÍFICAS
      // ===============================
      if (datasBloqueadas.includes(dataSelecionada)) {
        mostrarAviso("Esta data está reservada para evento interno ou feriado.");
        alert("Esta data está reservada para evento interno ou feriado.");
        inputData.value = "";
        selectHorario.innerHTML = '<option value="">Dia indisponível</option>';
        return;
      }

      selectHorario.innerHTML = "<option>Consultando agenda...</option>";

      try {
        // ===============================
        // BUSCAR AGENDAMENTOS DO DIA
        //
        // Importante:
        // .neq("status", "cancelado")
        // faz com que agendamentos cancelados
        // não ocupem mais horário.
        // ===============================
        const { data: agendados, error } = await client
          .from("agendamentos")
          .select("horario, status")
          .eq("data", dataSelecionada)
          .neq("status", "cancelado");

        if (error) throw error;

        const ocupados = (agendados || []).map(item => String(item.horario).trim());

        selectHorario.innerHTML = '<option value="">Escolha o horário</option>';

        // ===============================
        // MOSTRAR APENAS HORÁRIOS LIVRES
        // ===============================
        horariosTerQui.forEach(hora => {
          if (!ocupados.includes(hora)) {
            const option = document.createElement("option");
            option.value = hora;
            option.textContent = hora;
            selectHorario.appendChild(option);
          }
        });

        if (selectHorario.options.length === 1) {
          selectHorario.innerHTML = '<option value="">Lotado para este dia</option>';
        }

      } catch (err) {
        mostrarAviso("Erro ao buscar horários: " + err.message);
        alert("Erro ao buscar horários: " + err.message);
        selectHorario.innerHTML = '<option value="">Erro ao consultar agenda</option>';
      }
    });

    // ===============================
    // EVENTO: BOTÃO CONFIRMAR AGENDAMENTO
    //
    // Fluxo:
    // 1. valida campos;
    // 2. busca cadastro pelo telefone;
    // 3. bloqueia não cadastrados;
    // 4. bloqueia quem tem 2 faltas ou status bloqueado;
    // 5. salva agendamento;
    // 6. envia notificação para o bot.
    // ===============================
    btnAgendar.addEventListener("click", async () => {
      const nome = inputNome.value.trim();
      const telefone = inputTelefone.value.trim();
      const dataStr = inputData.value;
      const horario = selectHorario.value;

      // ===============================
      // VALIDAÇÃO SIMPLES DOS CAMPOS
      // ===============================
      if (!nome || !telefone || !dataStr || !horario) {
        mostrarAviso("Preencha todos os campos corretamente.");
        alert("Preencha todos os campos corretamente.");
        return;
      }

      btnAgendar.disabled = true;
      btnAgendar.innerText = "Verificando cadastro...";

      try {
        // ===============================
        // VERIFICAR CADASTRO DO USUÁRIO
        // Essa é a trava do site.
        // Mesmo que a pessoa tenha o link,
        // ela não agenda se não estiver apta.
        // ===============================
        const usuario = await buscarUsuarioPorTelefone(telefone);

        // ===============================
        // CASO NÃO ESTEJA CADASTRADO
        // ===============================
        if (!usuario || usuario.cadastrado === false) {
          mostrarAviso("⚠️ Você precisa estar cadastrado no CRJ antes de agendar. Procure a equipe presencialmente.");
          alert("⚠️ Você precisa estar cadastrado no CRJ antes de agendar. Procure a equipe presencialmente.");
          btnAgendar.disabled = false;
          btnAgendar.innerText = "Confirmar Agendamento";
          return;
        }

        // ===============================
        // VERIFICAR DATA DE NASCIMENTO E IDADE
        // A regra do CRJ permite agendamento apenas de 15 a 29 anos.
        // ===============================
        if (!usuario.data_nascimento) {
          mostrarAviso("Seu cadastro precisa ser atualizado com a data de nascimento. Procure a equipe do CRJ.");
          alert("Seu cadastro precisa ser atualizado com a data de nascimento. Procure a equipe do CRJ.");
          btnAgendar.disabled = false;
          btnAgendar.innerText = "Confirmar Agendamento";
          return;
        }

        if (!idadePermitida(usuario.data_nascimento)) {
          mostrarAviso("O LabStudio atende jovens de 15 a 29 anos. Procure a equipe do CRJ.");
          alert("O LabStudio atende jovens de 15 a 29 anos. Procure a equipe do CRJ.");
          btnAgendar.disabled = false;
          btnAgendar.innerText = "Confirmar Agendamento";
          return;
        }

        // ===============================
        // VERIFICAR FALTAS E STATUS
        // ===============================
        const statusUsuario = String(usuario.status || "").toLowerCase();
        const faltasUsuario = Number(usuario.faltas || 0);

        if (statusUsuario === "bloqueado" || faltasUsuario >= 2) {
          mostrarAviso("🚫 Você está bloqueado por faltas. Procure a equipe do CRJ para regularizar sua situação.");
          alert("🚫 Você está bloqueado por faltas. Procure a equipe do CRJ para regularizar sua situação.");
          btnAgendar.disabled = false;
          btnAgendar.innerText = "Confirmar Agendamento";
          return;
        }

        btnAgendar.innerText = "Agendando...";

        // ===============================
        // SALVAR AGENDAMENTO NO SUPABASE
        //
        // status: "agendado"
        // já deixa pronto para o painel admin
        // alterar depois para:
        // compareceu, faltou ou cancelado.
        // ===============================
        const { error } = await client
          .from("agendamentos")
          .insert([{ 
            nome, 
            telefone, 
            data: dataStr, 
            horario,
            status: "agendado"
          }]);

        if (error) throw error;

        // ===============================
        // NOTIFICAR O BOT NO WHATSAPP
        //
        // Se o bot/ngrok estiver offline,
        // o agendamento continua salvo,
        // mas aparece aviso no console.
        // ===============================
        try {
          await fetch(`${BOT_URL}/notificar`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
              nome, 
              telefone, 
              data: dataStr, 
              horario 
            })
          });
        } catch (zapError) {
          console.warn("Agendamento salvo, mas a notificação no WhatsApp falhou:", zapError);
        }

        mostrarAviso(`Confirmado, ${nome}! 🔥\nTe esperamos dia ${dataStr} às ${horario}.`, "sucesso");
        alert(`Confirmado, ${nome}! 🔥\nTe esperamos dia ${dataStr} às ${horario}.`);
        location.reload();

      } catch (err) {
        mostrarAviso("Erro ao salvar: " + err.message);
        alert("Erro ao salvar: " + err.message);
        btnAgendar.disabled = false;
        btnAgendar.innerText = "Confirmar Agendamento";
      }
    });
  </script>
</body>
</html>
