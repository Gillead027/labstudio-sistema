<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LabStudio CRJ Flexal - Agendamento</title>
  
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text: #f8fafc;
      --input-bg: #334155;
      --border: #475569;
    }

    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .container {
      background-color: var(--card-bg);
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      width: 100%;
      max-width: 400px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    h1 {
      text-align: center;
      margin-bottom: 2rem;
      color: var(--primary);
      font-size: 1.8rem;
      letter-spacing: -1px;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.6rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, select {
      width: 100%;
      padding: 0.8rem;
      border-radius: 0.6rem;
      border: 1px solid var(--border);
      background-color: var(--input-bg);
      color: white;
      font-size: 1rem;
      transition: all 0.2s ease;
      outline: none;
      box-sizing: border-box;
    }

    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    button {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 0.6rem;
      background-color: var(--primary);
      color: white;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.1s active, background 0.2s;
      margin-top: 1rem;
    }

    button:hover {
      background-color: var(--primary-hover);
    }

    button:disabled {
      background-color: var(--border);
      cursor: not-allowed;
    }

    option {
      background-color: var(--card-bg);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>LabStudio CRJ</h1>

    <div class="form-group">
      <label for="nome">Nome do Artista / Grupo</label>
      <input type="text" id="nome" placeholder="Ex: MC Jovem">
    </div>

    <div class="form-group">
      <label for="data">Data do Set</label>
      <input type="date" id="data">
    </div>

    <div class="form-group">
      <label for="horario">Horários Disponíveis</label>
      <select id="horario">
        <option value="">Selecione uma data primeiro</option>
      </select>
    </div>

    <button id="btn">Confirmar Agendamento</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const client = window.supabase.createClient(
      "https://hblxvxgocemzctjbutgi.supabase.co",
      "sb_publishable_12C1Wu47s3SuxqHZvQybdg_WubBGiQl"
    );

    const horariosTerQui = ["18:00", "18:30"];
    const horariosSexta = ["14:00", "15:00", "16:00"]; 
    
    const datasBloqueadas = [
        "2024-07-19", 
        "2024-05-01", 
        "2024-05-30"
    ];

    const inputNome = document.getElementById("nome");
    const inputData = document.getElementById("data");
    const selectHorario = document.getElementById("horario");
    const btnAgendar = document.getElementById("btn");

    // 🔥 ISSO AQUI FAZ OS HORÁRIOS APARECEREM QUANDO ESCOLHE A DATA
    inputData.addEventListener("change", async () => {
      const dataSelecionada = inputData.value;
      if (!dataSelecionada) return;

      const dataObjeto = new Date(dataSelecionada + "T12:00:00");
      const diaSemana = dataObjeto.getDay(); 

      if ([0, 1, 3, 6].includes(diaSemana)) {
        alert("O LabStudio funciona apenas Terças, Quintas e Sextas selecionadas.");
        inputData.value = "";
        selectHorario.innerHTML = '<option value="">Dia indisponível</option>';
        return;
      }

      if (datasBloqueadas.includes(dataSelecionada)) {
        alert("Esta data está reservada para evento interno ou feriado.");
        inputData.value = "";
        selectHorario.innerHTML = '<option value="">Dia indisponível</option>';
        return;
      }

      selectHorario.innerHTML = "<option>Consultando agenda...</option>";

      const { data: agendados, error } = await client
        .from("agendamentos")
        .select("horario")
        .eq("data", dataSelecionada);

      if (error) {
        alert("Erro ao buscar horários: " + error.message);
        return;
      }

      const ocupados = (agendados || []).map(item => item.horario.trim());

      let gradeHoraria = [];
      if (diaSemana === 2 || diaSemana === 4) {
        gradeHoraria = horariosTerQui;
      } else if (diaSemana === 5) {
        gradeHoraria = horariosSexta;
      }

      selectHorario.innerHTML = '<option value="">Escolha o horário</option>';
      gradeHoraria.forEach(hora => {
        if (!ocupados.includes(hora)) {
          const option = document.createElement("option");
          option.value = hora;
          option.textContent = hora;
          selectHorario.appendChild(option);
        }
      });

      if (selectHorario.options.length === 1) {
        selectHorario.innerHTML = '<option value="">Lotado para este dia</option>';
      }
    });

    // 🔥 O BOTÃO DE AGENDAR (COM O AWAIT CORRETO)
    btnAgendar.addEventListener("click", async () => {
      const nome = inputNome.value.trim();
      const dataStr = inputData.value;
      const horario = selectHorario.value;

      if (!nome || !dataStr || !horario) {
        alert("Preencha todos os campos corretamente.");
        return;
      }

      btnAgendar.disabled = true;
      btnAgendar.innerText = "Agendando...";

      try {
        const { error } = await client
          .from("agendamentos")
          .insert([{ nome, data: dataStr, horario }]);

        if (error) throw error;

       await fetch("https://tightly-rubber-dyslexic.ngrok-free.dev/notificar", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ nome, data: dataStr, horario }),
          mode: 'cors' 
        });

        alert(`Confirmado, ${nome}! 🔥\nTe esperamos dia ${dataStr} às ${horario}.`);
        location.reload();

      } catch (err) {
        alert("Erro ao salvar: " + err.message);
        btnAgendar.disabled = false;
        btnAgendar.innerText = "Confirmar Agendamento";
      }
    });
  </script>
</body>
</html>
