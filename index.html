<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LabStudio CRJ Flexal</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 30px;
    }

    input, select, button {
      padding: 10px;
      margin: 10px;
      width: 250px;
    }
  </style>
</head>
<body>

<h1>LabStudio CRJ</h1>

<input type="text" id="nome" placeholder="Nome"><br>
<input type="text" id="telefone" placeholder="WhatsApp (27999999999)"><br>
<input type="date" id="data"><br>

<select id="horario">
  <option value="">Selecione a data</option>
</select><br>

<button id="btn">Agendar</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = window.supabase.createClient(
  "https://hblxvxgocemzctjbutgi.supabase.co",
  "sb_publishable_12C1Wu47s3SuxqHZvQybdg_WubBGiQl"
);

const horarios = ["14:00","15:00","16:00"];

const inputNome = document.getElementById("nome");
const inputTel = document.getElementById("telefone");
const inputData = document.getElementById("data");
const selectHorario = document.getElementById("horario");
const btn = document.getElementById("btn");

// 🔥 carregar horários
inputData.addEventListener("change", async () => {
  const data = inputData.value;
  if (!data) return;

  selectHorario.innerHTML = "<option>Carregando...</option>";

  const { data: agendados } = await client
    .from("agendamentos")
    .select("horario")
    .eq("data", data);

  const ocupados = (agendados || []).map(i => i.horario);

  selectHorario.innerHTML = '<option value="">Escolha</option>';

  horarios.forEach(h => {
    if (!ocupados.includes(h)) {
      const opt = document.createElement("option");
      opt.value = h;
      opt.textContent = h;
      selectHorario.appendChild(opt);
    }
  });
});

// 🔥 agendar
btn.addEventListener("click", async () => {
  const nome = inputNome.value.trim();
  const telefone = inputTel.value.trim();
  const data = inputData.value;
  const horario = selectHorario.value;

  if (!nome || !telefone || !data || !horario) {
    alert("Preencha tudo");
    return;
  }

  btn.disabled = true;
  btn.innerText = "Verificando...";

  try {
    // verificar usuário
    const { data: user } = await client
      .from("usuarios")
      .select("*")
      .eq("telefone", telefone)
      .maybeSingle();

    if (!user) {
      alert("Você precisa se cadastrar no CRJ.");
      btn.disabled = false;
      btn.innerText = "Agendar";
      return;
    }

    if (user.faltas >= 2) {
      alert("Você está bloqueado.");
      btn.disabled = false;
      btn.innerText = "Agendar";
      return;
    }

    btn.innerText = "Agendando...";

    await client
      .from("agendamentos")
      .insert([{ nome, telefone, data, horario }]);

    // enviar pro bot
    await fetch("https://tightly-rubber-dyslexic.ngrok-free.dev/notificar", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ nome, telefone, data, horario })
    });

    alert("Agendado com sucesso!");
    location.reload();

  } catch (err) {
    alert("Erro: " + err.message);
    btn.disabled = false;
    btn.innerText = "Agendar";
  }
});
</script>

</body>
</html>
