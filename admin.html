<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin - LabStudio CRJ</title>

  <style>
    /* ===============================
       CORES DO PAINEL ADMIN
    =============================== */
    :root {
      --primary: #6366f1;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: #475569;
      --input: #334155;
    }

    /* ===============================
       ESTILO GERAL
    =============================== */
    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    h1 {
      color: var(--primary);
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 30px;
    }

    /* ===============================
       ÁREA DE FILTROS
    =============================== */
    .filtros {
      background: var(--card);
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: end;
    }

    .grupo {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: bold;
      text-transform: uppercase;
    }

    input, select {
      background: var(--input);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: bold;
      color: white;
      background: var(--primary);
    }

    button:hover {
      opacity: 0.9;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .btn-presenca {
      background: var(--success);
    }

    .btn-falta {
      background: var(--warning);
    }

    .btn-cancelar {
      background: var(--danger);
    }

    .btn-secundario {
      background: var(--border);
    }

    /* ===============================
       PAINEL DE RESUMO E RANKING
    =============================== */
    .painel-resumo {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }

    .bloco-resumo {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 16px;
    }

    .bloco-resumo h3 {
      margin-top: 0;
      color: var(--primary);
      font-size: 1rem;
    }

    .numero-grande {
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .item-ranking {
      color: var(--muted);
      margin-bottom: 8px;
      line-height: 1.4;
      font-size: 0.95rem;
    }

    /* ===============================
       PAINEL DE PENDÊNCIAS
    =============================== */
    .painel-pendencias {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .pendencias-topo {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .painel-pendencias h2 {
      margin: 0;
      color: var(--warning);
      font-size: 1.2rem;
    }

    .pendencia-item {
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 12px;
      margin-top: 12px;
    }

    .pendencia-info {
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 10px;
    }

    /* ===============================
       CARDS DE AGENDAMENTO
    =============================== */
    .card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
    }

    .linha-topo {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .nome {
      font-size: 1.1rem;
      font-weight: bold;
    }

    .status {
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: bold;
      text-transform: uppercase;
    }

    .status-agendado {
      background: #334155;
      color: #cbd5e1;
    }

    .status-compareceu {
      background: #14532d;
      color: #bbf7d0;
    }

    .status-faltou {
      background: #713f12;
      color: #fde68a;
    }

    .status-cancelado {
      background: #7f1d1d;
      color: #fecaca;
    }

    .info {
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .observacao {
      background: rgba(255,255,255,0.04);
      color: #cbd5e1;
      border-left: 3px solid var(--primary);
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 14px;
      line-height: 1.5;
      white-space: pre-line;
    }

    .acoes {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .vazio {
      color: var(--muted);
      background: var(--card);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Painel Admin - LabStudio CRJ</h1>
    <div class="subtitle">Gerencie agendamentos, presenças, faltas, cancelamentos, pendências e ranking.</div>

    <!-- ===============================
         FILTROS DO PAINEL
    =============================== -->
    <div class="filtros">
      <div class="grupo">
        <label for="filtroData">Filtrar por data</label>
        <input type="date" id="filtroData">
      </div>

      <div class="grupo">
        <label for="filtroStatus">Status</label>
        <select id="filtroStatus">
          <option value="">Todos</option>
          <option value="agendado">Agendado</option>
          <option value="compareceu">Compareceu</option>
          <option value="faltou">Faltou</option>
          <option value="cancelado">Cancelado</option>
        </select>
      </div>

      <button id="btnFiltrar">Filtrar</button>
      <button id="btnLimpar" class="btn-secundario">Limpar</button>
    </div>

    <!-- ===============================
         PAINEL DE RESUMO E RANKING
    =============================== -->
    <div id="painelResumo" class="painel-resumo">
      <div class="vazio">Carregando resumo...</div>
    </div>

    <!-- ===============================
         PAINEL DE PENDÊNCIAS
         Agora tem botão para processar faltas pendentes com segurança.
    =============================== -->
    <div class="painel-pendencias">
      <div class="pendencias-topo">
        <h2>⚠️ Pendências de verificação</h2>

        <button id="btnProcessarPendencias" class="btn-falta">
          Processar faltas pendentes
        </button>
      </div>

      <div id="conteudoPendencias">
        <div class="vazio">Carregando pendências...</div>
      </div>
    </div>

    <!-- ===============================
         LISTA DE AGENDAMENTOS
    =============================== -->
    <div id="listaAgendamentos"></div>
  </div>

  <!-- ===============================
       BIBLIOTECA SUPABASE
  =============================== -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // ===============================
    // CONEXÃO COM SUPABASE
    // ===============================
    const client = window.supabase.createClient(
      "https://hblxvxgocemzctjbutgi.supabase.co",
      "sb_publishable_12C1Wu47s3SuxqHZvQybdg_WubBGiQl"
    );

    // ===============================
    // ELEMENTOS DA TELA
    // ===============================
    const lista = document.getElementById("listaAgendamentos");
    const painelResumo = document.getElementById("painelResumo");
    const conteudoPendencias = document.getElementById("conteudoPendencias");
    const filtroData = document.getElementById("filtroData");
    const filtroStatus = document.getElementById("filtroStatus");
    const btnFiltrar = document.getElementById("btnFiltrar");
    const btnLimpar = document.getElementById("btnLimpar");
    const btnProcessarPendencias = document.getElementById("btnProcessarPendencias");

    // ===============================
    // FUNÇÃO: ESCAPAR TEXTO
    // Evita que texto digitado por usuário quebre o HTML
    // ===============================
    function escaparHtml(valor) {
      return String(valor || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    // ===============================
    // FUNÇÃO: FORMATAR DATA
    // Recebe 2025-05-30 e mostra 30/05/2025
    // ===============================
    function formatarData(data) {
      if (!data) return "";
      const dataLimpa = String(data).split("T")[0];
      const [ano, mes, dia] = dataLimpa.split("-");
      return `${dia}/${mes}/${ano}`;
    }

    // ===============================
    // FUNÇÃO: CLASSE VISUAL DO STATUS
    // Define a cor do status no card
    // ===============================
    function classeStatus(status) {
      if (status === "compareceu") return "status status-compareceu";
      if (status === "faltou") return "status status-faltou";
      if (status === "cancelado") return "status status-cancelado";
      return "status status-agendado";
    }

    // ===============================
    // FUNÇÃO: LIMPAR TELEFONE
    // Remove tudo que não for número
    // ===============================
    function limparTelefone(valor) {
      return String(valor || "").replace(/\D/g, "");
    }

    // ===============================
    // FUNÇÃO: GERAR VARIAÇÕES DO TELEFONE
    // Ajuda a encontrar usuário mesmo com telefone em formatos diferentes
    // ===============================
    function gerarVariantesTelefone(valor) {
      const numero = limparTelefone(valor);

      if (!numero) return [];

      const variantes = new Set();

      function adicionar(n) {
        if (!n) return;

        variantes.add(n);

        if (n.startsWith("55")) {
          variantes.add(n.slice(2));
        } else {
          variantes.add("55" + n);
        }
      }

      adicionar(numero);

      const sem55 = numero.startsWith("55") ? numero.slice(2) : numero;

      adicionar(sem55);

      // Exemplo: 27997136155 também testa 2797136155
      if (sem55.length === 11 && sem55[2] === "9") {
        const semNonoDigito = sem55.slice(0, 2) + sem55.slice(3);
        adicionar(semNonoDigito);
      }

      // Exemplo: 2797136155 também testa 27997136155
      if (sem55.length === 10) {
        const comNonoDigito = sem55.slice(0, 2) + "9" + sem55.slice(2);
        adicionar(comNonoDigito);
      }

      return [...variantes];
    }

    // ===============================
    // FUNÇÃO: BUSCAR USUÁRIO PELO TELEFONE
    // Compara telefone do agendamento com telefones na tabela usuarios
    // ===============================
    async function buscarUsuarioPorTelefone(telefone) {
      const variantesDigitadas = gerarVariantesTelefone(telefone);

      console.log("🔎 Variantes do telefone do agendamento:", variantesDigitadas);

      const { data: usuarios, error } = await client
        .from("usuarios")
        .select("*");

      if (error) {
        console.warn("Erro ao buscar usuários:", error.message);
        return null;
      }

      const usuarioEncontrado = (usuarios || []).find(usuario => {
        const variantesBanco = gerarVariantesTelefone(usuario.telefone);

        return variantesBanco.some(numeroBanco =>
          variantesDigitadas.includes(numeroBanco)
        );
      });

      if (usuarioEncontrado) {
        console.log("✅ Usuário encontrado:", usuarioEncontrado.nome, usuarioEncontrado.telefone);
      } else {
        console.warn("❌ Usuário não encontrado para o telefone:", telefone);
      }

      return usuarioEncontrado || null;
    }

    // ===============================
    // FUNÇÃO: BUSCAR AGENDAMENTO POR ID
    // Usada para evitar somar falta/presença repetidamente
    // ===============================
    async function buscarAgendamentoPorId(id) {
      const { data, error } = await client
        .from("agendamentos")
        .select("*")
        .eq("id", id)
        .maybeSingle();

      if (error) {
        throw error;
      }

      return data;
    }

    // ===============================
    // FUNÇÃO: VERIFICAR SE UM AGENDAMENTO JÁ PASSOU
    // Usada para listar pendências comuns
    // ===============================
    function agendamentoJaPassou(data, horario) {
      if (!data || !horario) return false;

      const dataLimpa = String(data).split("T")[0];
      const horarioLimpo = String(horario).slice(0, 5);

      const dataHoraAgendada = new Date(`${dataLimpa}T${horarioLimpo}:00`);
      const agora = new Date();

      return dataHoraAgendada < agora;
    }

    // ===============================
    // FUNÇÃO: VERIFICAR SE UM AGENDAMENTO PASSOU HÁ MAIS DE 24H
    //
    // Essa é a regra segura para o botão:
    // "Processar faltas pendentes".
    //
    // Só processa automaticamente se:
    // horário do agendamento + 24h < agora
    // ===============================
    function agendamentoPassouMaisDe24h(data, horario) {
      if (!data || !horario) return false;

      const dataLimpa = String(data).split("T")[0];
      const horarioLimpo = String(horario).slice(0, 5);

      const dataHoraAgendada = new Date(`${dataLimpa}T${horarioLimpo}:00`);
      const agora = new Date();

      const vinteQuatroHoras = 24 * 60 * 60 * 1000;
      const diferenca = agora - dataHoraAgendada;

      return diferenca > vinteQuatroHoras;
    }

    // ===============================
    // FUNÇÃO: ATUALIZAR CONTADORES DO USUÁRIO
    //
    // Usada para:
    // - somar presença
    // - somar falta
    // - corrigir contagem se mudar de "faltou" para "compareceu"
    // - corrigir contagem se mudar de "compareceu" para "faltou"
    // ===============================
    async function atualizarContadoresUsuario(telefone, presencasDelta, faltasDelta) {
      const usuario = await buscarUsuarioPorTelefone(telefone);

      if (!usuario) {
        alert("Não encontrei o usuário na tabela usuarios para atualizar presença/falta.");
        return false;
      }

      const presencasAtuais = Number(usuario.presencas || 0);
      const faltasAtuais = Number(usuario.faltas || 0);

      const novasPresencas = Math.max(0, presencasAtuais + presencasDelta);
      const novasFaltas = Math.max(0, faltasAtuais + faltasDelta);

      let novoStatus = usuario.status || "ativo";

      // Se chegou a 2 faltas, bloqueia automaticamente
      if (novasFaltas >= 2) {
        novoStatus = "bloqueado";
      }

      // Se foi uma correção e caiu para menos de 2 faltas, desbloqueia automaticamente
      if (String(novoStatus).toLowerCase() === "bloqueado" && novasFaltas < 2) {
        novoStatus = "ativo";
      }

      const { error } = await client
        .from("usuarios")
        .update({
          presencas: novasPresencas,
          faltas: novasFaltas,
          status: novoStatus
        })
        .eq("id", usuario.id);

      if (error) {
        alert("Erro ao atualizar usuário: " + error.message);
        return false;
      }

      console.log("✅ Usuário atualizado:", {
        nome: usuario.nome,
        presencas: novasPresencas,
        faltas: novasFaltas,
        status: novoStatus
      });

      return true;
    }

    // ===============================
    // FUNÇÃO: CARREGAR RESUMO E RANKING
    // Monta:
    // - resumo geral
    // - ranking de presença
    // - ranking de faltas
    // - lista de bloqueados
    // ===============================
    async function carregarResumoRanking() {
      painelResumo.innerHTML = '<div class="vazio">Carregando resumo...</div>';

      const { data: agendamentos, error: erroAgendamentos } = await client
        .from("agendamentos")
        .select("*");

      if (erroAgendamentos) {
        painelResumo.innerHTML = `<div class="vazio">Erro ao carregar resumo: ${erroAgendamentos.message}</div>`;
        return;
      }

      const { data: usuarios, error: erroUsuarios } = await client
        .from("usuarios")
        .select("*");

      if (erroUsuarios) {
        painelResumo.innerHTML = `<div class="vazio">Erro ao carregar usuários: ${erroUsuarios.message}</div>`;
        return;
      }

      const listaAgendamentos = agendamentos || [];
      const listaUsuarios = usuarios || [];

      const totalAgendamentos = listaAgendamentos.length;

      const totalAgendados = listaAgendamentos.filter(item =>
        (item.status || "agendado") === "agendado"
      ).length;

      const totalCompareceram = listaAgendamentos.filter(item =>
        item.status === "compareceu"
      ).length;

      const totalFaltaram = listaAgendamentos.filter(item =>
        item.status === "faltou"
      ).length;

      const totalCancelados = listaAgendamentos.filter(item =>
        item.status === "cancelado"
      ).length;

      const totalPendentes = listaAgendamentos.filter(item =>
        (item.status || "agendado") === "agendado" &&
        agendamentoJaPassou(item.data, item.horario)
      ).length;

      const totalPendentes24h = listaAgendamentos.filter(item =>
        (item.status || "agendado") === "agendado" &&
        agendamentoPassouMaisDe24h(item.data, item.horario)
      ).length;

      const totalBloqueados = listaUsuarios.filter(user =>
        String(user.status || "").toLowerCase() === "bloqueado"
      ).length;

      const rankingPresencas = [...listaUsuarios]
        .filter(user => Number(user.presencas || 0) > 0)
        .sort((a, b) => Number(b.presencas || 0) - Number(a.presencas || 0))
        .slice(0, 5);

      const rankingFaltas = [...listaUsuarios]
        .filter(user => Number(user.faltas || 0) > 0)
        .sort((a, b) => Number(b.faltas || 0) - Number(a.faltas || 0))
        .slice(0, 5);

      const bloqueados = listaUsuarios.filter(user =>
        String(user.status || "").toLowerCase() === "bloqueado"
      );

      painelResumo.innerHTML = `
        <div class="bloco-resumo">
          <h3>📊 Resumo geral</h3>
          <div class="numero-grande">${totalAgendamentos}</div>
          <div class="item-ranking">Agendados: ${totalAgendados}</div>
          <div class="item-ranking">Compareceram: ${totalCompareceram}</div>
          <div class="item-ranking">Faltaram: ${totalFaltaram}</div>
          <div class="item-ranking">Cancelados: ${totalCancelados}</div>
          <div class="item-ranking">Pendentes: ${totalPendentes}</div>
          <div class="item-ranking">Pendentes +24h: ${totalPendentes24h}</div>
        </div>

        <div class="bloco-resumo">
          <h3>🏆 Ranking de presença</h3>
          ${
            rankingPresencas.length === 0
              ? '<div class="item-ranking">Nenhuma presença registrada ainda.</div>'
              : rankingPresencas.map((user, index) => `
                  <div class="item-ranking">
                    ${index + 1}. ${escaparHtml(user.nome || "Sem nome")} — ${Number(user.presencas || 0)} presença(s)
                  </div>
                `).join("")
          }
        </div>

        <div class="bloco-resumo">
          <h3>⚠️ Ranking de faltas</h3>
          ${
            rankingFaltas.length === 0
              ? '<div class="item-ranking">Nenhuma falta registrada ainda.</div>'
              : rankingFaltas.map((user, index) => `
                  <div class="item-ranking">
                    ${index + 1}. ${escaparHtml(user.nome || "Sem nome")} — ${Number(user.faltas || 0)} falta(s)
                  </div>
                `).join("")
          }
        </div>

        <div class="bloco-resumo">
          <h3>🚫 Bloqueados</h3>
          <div class="numero-grande">${totalBloqueados}</div>
          ${
            bloqueados.length === 0
              ? '<div class="item-ranking">Nenhum usuário bloqueado.</div>'
              : bloqueados.map(user => `
                  <div class="item-ranking">
                    ${escaparHtml(user.nome || "Sem nome")} — ${escaparHtml(user.telefone || "")}
                  </div>
                `).join("")
          }
        </div>
      `;
    }

    // ===============================
    // FUNÇÃO: CARREGAR PENDÊNCIAS
    //
    // Mostra agendamentos antigos que ainda estão como "agendado".
    // Assim você decide manualmente se compareceu, faltou ou cancelou.
    // ===============================
    async function carregarPendencias() {
      conteudoPendencias.innerHTML = '<div class="vazio">Carregando pendências...</div>';

      const { data, error } = await client
        .from("agendamentos")
        .select("*")
        .eq("status", "agendado")
        .order("data", { ascending: true })
        .order("horario", { ascending: true });

      if (error) {
        conteudoPendencias.innerHTML = `<div class="vazio">Erro ao carregar pendências: ${error.message}</div>`;
        return;
      }

      const pendencias = (data || []).filter(item =>
        agendamentoJaPassou(item.data, item.horario)
      );

      if (pendencias.length === 0) {
        conteudoPendencias.innerHTML = '<div class="vazio">Nenhuma pendência no momento.</div>';
        return;
      }

      conteudoPendencias.innerHTML = `
        <div class="item-ranking">
          Existem ${pendencias.length} agendamento(s) antigo(s) ainda sem confirmação.
        </div>
      `;

      pendencias.forEach(agendamento => {
        const item = document.createElement("div");
        item.className = "pendencia-item";

        const pendente24h = agendamentoPassouMaisDe24h(agendamento.data, agendamento.horario);

        item.innerHTML = `
          <div class="pendencia-info">
            <strong>${escaparHtml(agendamento.nome || "Sem nome")}</strong><br>
            📱 ${escaparHtml(agendamento.telefone || "Não informado")}<br>
            📅 ${formatarData(agendamento.data)} às ${escaparHtml(agendamento.horario || "-")}<br>
            ${pendente24h ? "⏳ Pendente há mais de 24h" : "🕒 Pendente recente"}
          </div>

          <div class="acoes">
            <button class="btn-presenca">Confirmar presença</button>
            <button class="btn-falta">Marcar falta</button>
            <button class="btn-cancelar">Cancelar com motivo</button>
          </div>
        `;

        const btnPresenca = item.querySelector(".btn-presenca");
        const btnFalta = item.querySelector(".btn-falta");
        const btnCancelar = item.querySelector(".btn-cancelar");

        btnPresenca.addEventListener("click", () => {
          confirmarPresenca(agendamento.id);
        });

        btnFalta.addEventListener("click", () => {
          marcarFalta(agendamento.id);
        });

        btnCancelar.addEventListener("click", () => {
          cancelarAgendamento(agendamento.id);
        });

        conteudoPendencias.appendChild(item);
      });
    }

    // ===============================
    // FUNÇÃO: CARREGAR AGENDAMENTOS
    // Busca os agendamentos no Supabase e monta os cards
    // ===============================
    async function carregarAgendamentos() {
      lista.innerHTML = '<div class="vazio">Carregando agendamentos...</div>';

      let query = client
        .from("agendamentos")
        .select("*")
        .order("data", { ascending: true })
        .order("horario", { ascending: true });

      if (filtroData.value) {
        query = query.eq("data", filtroData.value);
      }

      if (filtroStatus.value) {
        query = query.eq("status", filtroStatus.value);
      }

      const { data, error } = await query;

      if (error) {
        lista.innerHTML = `<div class="vazio">Erro ao carregar: ${error.message}</div>`;
        return;
      }

      if (!data || data.length === 0) {
        lista.innerHTML = '<div class="vazio">Nenhum agendamento encontrado.</div>';
        return;
      }

      lista.innerHTML = "";

      data.forEach((agendamento) => {
        const status = agendamento.status || "agendado";

        const card = document.createElement("div");
        card.className = "card";

        const desabilitarPresenca = status === "compareceu" || status === "cancelado";
        const desabilitarFalta = status === "faltou" || status === "cancelado";
        const desabilitarCancelar = status !== "agendado";

        card.innerHTML = `
          <div class="linha-topo">
            <div class="nome">${escaparHtml(agendamento.nome || "Sem nome")}</div>
            <div class="${classeStatus(status)}">${escaparHtml(status)}</div>
          </div>

          <div class="info">
            📱 Telefone: ${escaparHtml(agendamento.telefone || "Não informado")}<br>
            📅 Data: ${formatarData(agendamento.data)}<br>
            ⏰ Horário: ${escaparHtml(agendamento.horario || "-")}
          </div>

          ${
            agendamento.observacao
              ? `<div class="observacao">📝 ${escaparHtml(agendamento.observacao)}</div>`
              : ""
          }

          <div class="acoes">
            <button class="btn-presenca" ${desabilitarPresenca ? "disabled" : ""}>
              Confirmar presença
            </button>

            <button class="btn-falta" ${desabilitarFalta ? "disabled" : ""}>
              Marcar falta
            </button>

            <button class="btn-cancelar" ${desabilitarCancelar ? "disabled" : ""}>
              Cancelar
            </button>
          </div>
        `;

        const btnPresenca = card.querySelector(".btn-presenca");
        const btnFalta = card.querySelector(".btn-falta");
        const btnCancelar = card.querySelector(".btn-cancelar");

        btnPresenca.addEventListener("click", () => {
          confirmarPresenca(agendamento.id);
        });

        btnFalta.addEventListener("click", () => {
          marcarFalta(agendamento.id);
        });

        btnCancelar.addEventListener("click", () => {
          cancelarAgendamento(agendamento.id);
        });

        lista.appendChild(card);
      });
    }

    // ===============================
    // FUNÇÃO: RECARREGAR TUDO
    // Atualiza resumo, pendências e lista
    // ===============================
    function recarregarPainel() {
      carregarResumoRanking();
      carregarPendencias();
      carregarAgendamentos();
    }

    // ===============================
    // FUNÇÃO: CONFIRMAR PRESENÇA
    // ===============================
    async function confirmarPresenca(agendamentoId) {
      const confirmar = confirm("Confirmar presença deste jovem?");
      if (!confirmar) return;

      try {
        const agendamento = await buscarAgendamentoPorId(agendamentoId);

        if (!agendamento) {
          alert("Agendamento não encontrado.");
          return;
        }

        const statusAtual = agendamento.status || "agendado";

        if (statusAtual === "compareceu") {
          alert("Este agendamento já está marcado como compareceu.");
          return;
        }

        if (statusAtual === "cancelado") {
          alert("Este agendamento está cancelado e não pode receber presença.");
          return;
        }

        let presencasDelta = 1;
        let faltasDelta = 0;

        if (statusAtual === "faltou") {
          faltasDelta = -1;
        }

        const usuarioAtualizado = await atualizarContadoresUsuario(
          agendamento.telefone,
          presencasDelta,
          faltasDelta
        );

        if (!usuarioAtualizado) return;

        const { error: erroAgenda } = await client
          .from("agendamentos")
          .update({
            status: "compareceu",
            presenca_confirmada_em: new Date().toISOString()
          })
          .eq("id", agendamentoId);

        if (erroAgenda) {
          alert("Erro ao confirmar presença: " + erroAgenda.message);
          return;
        }

        alert("Presença confirmada!");
        recarregarPainel();

      } catch (err) {
        alert("Erro ao confirmar presença: " + err.message);
      }
    }

    // ===============================
    // FUNÇÃO: MARCAR FALTA
    // ===============================
    async function marcarFalta(agendamentoId) {
      const confirmar = confirm("Marcar falta para este jovem?");
      if (!confirmar) return;

      try {
        const agendamento = await buscarAgendamentoPorId(agendamentoId);

        if (!agendamento) {
          alert("Agendamento não encontrado.");
          return;
        }

        const statusAtual = agendamento.status || "agendado";

        if (statusAtual === "faltou") {
          alert("Este agendamento já está marcado como falta.");
          return;
        }

        if (statusAtual === "cancelado") {
          alert("Este agendamento está cancelado e não pode receber falta.");
          return;
        }

        let presencasDelta = 0;
        let faltasDelta = 1;

        if (statusAtual === "compareceu") {
          presencasDelta = -1;
        }

        const usuarioAtualizado = await atualizarContadoresUsuario(
          agendamento.telefone,
          presencasDelta,
          faltasDelta
        );

        if (!usuarioAtualizado) return;

        const { error: erroAgenda } = await client
          .from("agendamentos")
          .update({
            status: "faltou"
          })
          .eq("id", agendamentoId);

        if (erroAgenda) {
          alert("Erro ao marcar falta: " + erroAgenda.message);
          return;
        }

        alert("Falta registrada!");
        recarregarPainel();

      } catch (err) {
        alert("Erro ao marcar falta: " + err.message);
      }
    }

    // ===============================
    // FUNÇÃO: PROCESSAR FALTAS PENDENTES
    //
    // Esse botão pega agendamentos:
    // - status = agendado
    // - horário passou há mais de 24h
    //
    // E marca como falta automaticamente.
    // ===============================
    async function processarFaltasPendentes() {
      const confirmar = confirm(
        "Processar automaticamente faltas pendentes?\n\nSó serão marcados como falta os agendamentos que passaram há mais de 24 horas e ainda estão como agendados."
      );

      if (!confirmar) return;

      btnProcessarPendencias.disabled = true;
      btnProcessarPendencias.innerText = "Processando...";

      try {
        const { data, error } = await client
          .from("agendamentos")
          .select("*")
          .eq("status", "agendado");

        if (error) {
          alert("Erro ao buscar pendências: " + error.message);
          return;
        }

        const pendencias24h = (data || []).filter(item =>
          agendamentoPassouMaisDe24h(item.data, item.horario)
        );

        if (pendencias24h.length === 0) {
          alert("Nenhuma pendência com mais de 24h para processar.");
          return;
        }

        let processados = 0;
        let ignorados = 0;

        for (const agendamento of pendencias24h) {
          const usuarioAtualizado = await atualizarContadoresUsuario(
            agendamento.telefone,
            0,
            1
          );

          if (!usuarioAtualizado) {
            ignorados++;
            continue;
          }

          const observacaoAnterior = agendamento.observacao
            ? `${agendamento.observacao}\n`
            : "";

          const observacaoAutomatica =
            `${observacaoAnterior}Falta processada automaticamente pelo painel após mais de 24h pendente.`;

          const { error: erroAgenda } = await client
            .from("agendamentos")
            .update({
              status: "faltou",
              observacao: observacaoAutomatica
            })
            .eq("id", agendamento.id)
            .eq("status", "agendado");

          if (erroAgenda) {
            console.warn("Erro ao atualizar agendamento:", erroAgenda.message);
            ignorados++;
            continue;
          }

          processados++;
        }

        alert(`Processamento concluído!\n\nFaltas processadas: ${processados}\nIgnorados: ${ignorados}`);

        recarregarPainel();

      } catch (err) {
        alert("Erro ao processar pendências: " + err.message);
      } finally {
        btnProcessarPendencias.disabled = false;
        btnProcessarPendencias.innerText = "Processar faltas pendentes";
      }
    }

    // ===============================
    // FUNÇÃO: CANCELAR AGENDAMENTO
    //
    // Agora o cancelamento exige motivo.
    // O motivo é salvo na coluna "observacao".
    // ===============================
    async function cancelarAgendamento(agendamentoId) {
      const confirmar = confirm("Cancelar este agendamento?");
      if (!confirmar) return;

      const motivo = prompt(
        "Informe o motivo do cancelamento:\n\nEx: jovem avisou com antecedência, evento interno, problema técnico, falta de equipe..."
      );

      if (motivo === null) return;

      const motivoLimpo = motivo.trim();

      if (!motivoLimpo) {
        alert("Para cancelar, informe um motivo.");
        return;
      }

      try {
        const agendamento = await buscarAgendamentoPorId(agendamentoId);

        if (!agendamento) {
          alert("Agendamento não encontrado.");
          return;
        }

        const statusAtual = agendamento.status || "agendado";

        if (statusAtual !== "agendado") {
          alert("Só é possível cancelar agendamentos que ainda estão como agendados.");
          return;
        }

        const { error } = await client
          .from("agendamentos")
          .update({
            status: "cancelado",
            observacao: motivoLimpo
          })
          .eq("id", agendamentoId);

        if (error) {
          alert("Erro ao cancelar: " + error.message);
          return;
        }

        alert("Agendamento cancelado com motivo registrado!");
        recarregarPainel();

      } catch (err) {
        alert("Erro ao cancelar: " + err.message);
      }
    }

    // ===============================
    // BOTÃO: FILTRAR
    // ===============================
    btnFiltrar.addEventListener("click", () => {
      recarregarPainel();
    });

    // ===============================
    // BOTÃO: LIMPAR FILTROS
    // ===============================
    btnLimpar.addEventListener("click", () => {
      filtroData.value = "";
      filtroStatus.value = "";
      recarregarPainel();
    });

    // ===============================
    // BOTÃO: PROCESSAR FALTAS PENDENTES
    // ===============================
    btnProcessarPendencias.addEventListener("click", () => {
      processarFaltasPendentes();
    });

    // ===============================
    // CARREGAR PAINEL AO ABRIR
    // ===============================
    recarregarPainel();
  </script>
</body>
</html>
